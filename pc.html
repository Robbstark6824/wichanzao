<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Wichanzao · Panel de Referencias</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root {
  --n1:#0C1F3D; --n2:#142952; --n3:#1B3A6B;
  --tl:#4ECDC4; --tl2:#3BB8B0;
  --gd:#D4A853; --gd2:#C4983F;
  --bg:#F5F7FA; --s1:#FFF; --s2:#EEF1F6;
  --t1:#0D1B2A; --t2:#4A5568; --t3:#A0AEC0;
  --bd:#D8DFE9;
  --danger:#E53E3E; --success:#38A169; --warn:#D69E2E;
  --r1:16px; --r2:12px; --r3:8px;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body { font-family:'Manrope',sans-serif; background:var(--bg); color:var(--t1); min-height:100vh; }

/* ===== HEADER ===== */
.header {
  background:linear-gradient(135deg,var(--n1) 0%,var(--n2) 60%,var(--n3) 100%);
  color:#fff; padding:0; position:sticky; top:0; z-index:100;
  box-shadow:0 4px 24px rgba(0,0,0,.2);
}
.header-inner {
  max-width:1400px; margin:0 auto; padding:24px 32px;
  display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:16px;
  position:relative;
}
.header-inner::after {
  content:''; position:absolute; inset:0;
  background:radial-gradient(circle at 90% 20%,rgba(78,205,196,.1),transparent 50%);
  pointer-events:none;
}
.header-left { position:relative; z-index:1; }
.header-left h1 {
  font-family:'Playfair Display',serif; font-size:22px; font-weight:900;
  display:flex; align-items:center; gap:10px; line-height:1.2;
}
.header-left h1 svg { width:30px; height:30px; flex-shrink:0; }
.header-left .subtitle { font-size:12px; opacity:.5; margin-top:4px; font-weight:500; }
.header-right { display:flex; align-items:center; gap:16px; position:relative; z-index:1; }
.header-status {
  display:flex; align-items:center; gap:8px;
  background:rgba(255,255,255,.08); border-radius:var(--r3);
  padding:8px 14px; font-size:11px; font-weight:600;
}
.status-dot {
  width:8px; height:8px; border-radius:50%; background:var(--success);
  animation:pulse 2s infinite;
}
.status-dot.paused { background:var(--warn); animation:none; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
.refresh-countdown { font-variant-numeric:tabular-nums; min-width:24px; text-align:center; }

/* ===== MAIN LAYOUT ===== */
.main { max-width:1400px; margin:0 auto; padding:24px 24px 60px; }

/* ===== STATS BAR ===== */
.stats-bar {
  display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:12px; margin-bottom:24px;
}
.stat-card {
  background:var(--s1); border-radius:var(--r2); padding:18px 20px;
  border:1px solid var(--bd); text-align:center;
  transition:transform .2s, box-shadow .2s;
}
.stat-card:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,0,0,.06); }
.stat-val { font-size:28px; font-weight:800; color:var(--n1); line-height:1; }
.stat-val.teal { color:var(--tl); }
.stat-val.gold { color:var(--gd); }
.stat-label {
  font-size:10px; color:var(--t3); text-transform:uppercase;
  letter-spacing:1px; font-weight:700; margin-top:4px;
}

/* ===== TOOLBAR ===== */
.toolbar {
  display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap; align-items:center;
}
.search-wrap { flex:1; min-width:260px; position:relative; }
.search-wrap input {
  width:100%; padding:12px 16px 12px 42px;
  border-radius:var(--r2); border:2px solid var(--bd);
  font-size:14px; font-family:inherit; font-weight:500;
  color:var(--t1); outline:none; background:var(--s1);
  transition:border-color .2s, box-shadow .2s;
}
.search-wrap input:focus { border-color:var(--tl); box-shadow:0 0 0 3px rgba(78,205,196,.12); }
.search-wrap input::placeholder { color:var(--t3); }
.search-wrap .search-icon {
  position:absolute; left:14px; top:50%; transform:translateY(-50%);
  color:var(--t3); pointer-events:none; display:flex;
}
.search-wrap .search-hint {
  position:absolute; right:12px; top:50%; transform:translateY(-50%);
  font-size:10px; color:var(--t3); background:var(--s2);
  padding:2px 6px; border-radius:4px; font-weight:600;
  pointer-events:none;
}
.toolbar select {
  padding:12px 14px; border-radius:var(--r2); border:2px solid var(--bd);
  font-size:13px; font-weight:600; font-family:inherit;
  background:var(--s1); color:var(--t1); cursor:pointer; outline:none;
  transition:border-color .2s;
}
.toolbar select:focus { border-color:var(--tl); }
.tb-btn {
  padding:11px 20px; border-radius:var(--r2); border:2px solid var(--bd);
  background:var(--s1); color:var(--t1); font-size:12px; font-weight:700;
  font-family:inherit; cursor:pointer;
  display:inline-flex; align-items:center; gap:6px;
  transition:all .2s; white-space:nowrap;
}
.tb-btn:hover { border-color:var(--tl); background:rgba(78,205,196,.06); }
.tb-btn:active { transform:scale(.97); }
.tb-btn.primary { background:var(--n1); color:#fff; border-color:var(--n1); }
.tb-btn.primary:hover { background:var(--n2); }
.tb-btn.danger { color:var(--danger); border-color:rgba(229,62,62,.3); }
.tb-btn.danger:hover { background:rgba(229,62,62,.06); border-color:var(--danger); }

/* ===== VIEW MODES ===== */
.view-directory { display:block; }
.view-detail { display:none; }
.view-directory.hidden { display:none; }
.view-detail.visible { display:block; }

/* ===== WORKER GRID ===== */
.workers-grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px;
}
@media(max-width:1024px) { .workers-grid { grid-template-columns:repeat(2,1fr); } }
@media(max-width:600px) { .workers-grid { grid-template-columns:1fr; } }

.worker-card {
  background:var(--s1); border-radius:var(--r1); padding:20px;
  border:1px solid var(--bd); cursor:pointer;
  transition:all .25s cubic-bezier(.4,0,.2,1);
  display:flex; align-items:center; gap:14px;
  position:relative; overflow:hidden;
}
.worker-card::before {
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg,transparent 60%,rgba(78,205,196,.03));
  pointer-events:none;
}
.worker-card:hover {
  transform:translateY(-3px);
  box-shadow:0 12px 32px rgba(0,0,0,.08);
  border-color:var(--tl);
}
.worker-card:active { transform:translateY(-1px); }

/* Avatar */
.avatar {
  display:flex; align-items:center; justify-content:center;
  border-radius:50%; font-weight:800; color:#fff; flex-shrink:0;
  position:relative;
}
.avatar.sm { width:36px; height:36px; font-size:12px; }
.avatar.md { width:48px; height:48px; font-size:16px; }
.avatar.lg { width:64px; height:64px; font-size:22px; }
.avatar.xl { width:80px; height:80px; font-size:28px; }
.activity-dot {
  position:absolute; bottom:1px; right:1px;
  width:12px; height:12px; border-radius:50%;
  border:2px solid var(--s1);
}
.activity-dot.green { background:var(--success); }
.activity-dot.yellow { background:var(--warn); }
.activity-dot.gray { background:var(--t3); }

.worker-info { flex:1; min-width:0; }
.worker-name {
  font-size:15px; font-weight:800;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.worker-area {
  display:inline-block; margin-top:4px;
  padding:3px 10px; border-radius:6px;
  font-size:10px; font-weight:700; text-transform:uppercase;
  letter-spacing:.5px;
  background:rgba(78,205,196,.1); color:var(--tl2);
}
.worker-time { font-size:11px; color:var(--t3); margin-top:4px; font-weight:500; }
.worker-arrow { color:var(--t3); font-size:14px; flex-shrink:0; transition:transform .2s; }
.worker-card:hover .worker-arrow { transform:translateX(3px); color:var(--tl); }

/* ===== SKELETON ===== */
.skeleton { animation:shimmer 1.5s infinite; border-radius:var(--r2); }
@keyframes shimmer {
  0% { background-position:-200% 0; }
  100% { background-position:200% 0; }
}
.skel-card {
  background:var(--s1); border-radius:var(--r1); padding:20px;
  border:1px solid var(--bd); display:flex; align-items:center; gap:14px;
}
.skel-circle {
  width:48px; height:48px; border-radius:50%; flex-shrink:0;
  background:linear-gradient(90deg,var(--s2) 25%,#e8ebf0 50%,var(--s2) 75%);
  background-size:200% 100%; animation:shimmer 1.5s infinite;
}
.skel-lines { flex:1; }
.skel-line {
  height:12px; border-radius:6px; margin-bottom:8px;
  background:linear-gradient(90deg,var(--s2) 25%,#e8ebf0 50%,var(--s2) 75%);
  background-size:200% 100%; animation:shimmer 1.5s infinite;
}
.skel-line:last-child { margin-bottom:0; width:60%; }
.skel-line.short { width:40%; }

/* ===== DETAIL VIEW ===== */
.detail-header {
  background:var(--s1); border-radius:var(--r1); padding:24px;
  border:1px solid var(--bd); margin-bottom:20px;
  display:flex; align-items:center; gap:20px; flex-wrap:wrap;
}
.detail-back {
  width:42px; height:42px; border-radius:var(--r2);
  background:var(--s2); border:none; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  font-size:18px; color:var(--t1); transition:all .2s;
}
.detail-back:hover { background:var(--tl); color:var(--n1); }
.detail-info { flex:1; min-width:0; }
.detail-name {
  font-family:'Playfair Display',serif;
  font-size:22px; font-weight:800;
}
.detail-area-row { display:flex; align-items:center; gap:8px; margin-top:4px; flex-wrap:wrap; }
.detail-area {
  display:inline-block; padding:4px 12px; border-radius:6px;
  font-size:11px; font-weight:700; text-transform:uppercase;
  background:rgba(78,205,196,.1); color:var(--tl2);
}
.detail-activity { font-size:12px; color:var(--t3); }
.detail-actions { display:flex; gap:8px; flex-wrap:wrap; }

/* Month group */
.month-group { margin-bottom:20px; }
.month-header {
  display:flex; align-items:center; gap:10px; margin-bottom:10px;
  padding:0 4px; cursor:pointer; user-select:none;
}
.month-header h2 {
  font-family:'Playfair Display',serif; font-size:18px; font-weight:800;
  color:var(--n1); flex:1;
}
.month-header .month-count {
  font-size:11px; color:var(--t3); font-weight:600;
  background:var(--s2); padding:3px 10px; border-radius:12px;
}
.month-header .month-arrow {
  font-size:10px; color:var(--t3); transition:transform .25s cubic-bezier(.4,0,.2,1);
}
.month-header .month-arrow.open { transform:rotate(90deg); }
.month-body { display:none; }
.month-body.open { display:block; }

/* Date section */
.date-section {
  background:var(--s1); border-radius:var(--r1);
  border:1px solid var(--bd); margin-bottom:10px;
  overflow:hidden; transition:box-shadow .2s;
}
.date-section:hover { box-shadow:0 4px 16px rgba(0,0,0,.05); }
.date-header {
  padding:14px 18px; display:flex; align-items:center; gap:12px;
  cursor:pointer; user-select:none; transition:background .15s;
  border-bottom:1px solid transparent;
}
.date-header:hover { background:#FAFBFC; }
.date-header.open { border-bottom-color:var(--bd); background:#FAFBFC; }
.date-arrow {
  font-size:10px; color:var(--t3); transition:transform .25s cubic-bezier(.4,0,.2,1);
  flex-shrink:0;
}
.date-arrow.open { transform:rotate(90deg); }
.date-title { flex:1; }
.date-title h3 { font-size:14px; font-weight:700; display:flex; align-items:center; gap:8px; }
.date-title .today-badge {
  padding:2px 8px; border-radius:4px; font-size:9px; font-weight:700;
  background:var(--tl); color:var(--n1); text-transform:uppercase;
  letter-spacing:.5px;
}
.date-title .count {
  font-size:11px; color:var(--t3); font-weight:500; margin-top:2px;
}
.date-actions { display:flex; gap:6px; }
.date-btn {
  padding:7px 14px; border-radius:var(--r3); border:1.5px solid var(--bd);
  background:var(--s1); color:var(--t1); font-size:11px; font-weight:600;
  font-family:inherit; cursor:pointer;
  display:inline-flex; align-items:center; gap:4px;
  transition:all .15s;
}
.date-btn:hover { border-color:var(--tl); background:rgba(78,205,196,.06); }
.date-btn:active { transform:scale(.95); }

.date-body { display:none; padding:0; }
.date-body.open { display:block; }

/* File card */
.file-card {
  padding:16px 20px; border-bottom:1px solid #F0F2F5;
  display:flex; align-items:flex-start; gap:14px;
  transition:background .15s;
}
.file-card:last-child { border-bottom:none; }
.file-card:hover { background:#FAFBFC; }
.file-thumb {
  width:60px; height:76px; border-radius:var(--r3);
  object-fit:cover; border:1px solid var(--bd);
  cursor:pointer; flex-shrink:0;
  transition:transform .2s, box-shadow .2s;
  background:var(--s2);
}
.file-thumb:hover { transform:scale(1.06); box-shadow:0 4px 12px rgba(0,0,0,.1); }
.file-content { flex:1; min-width:0; }
.file-head { display:flex; align-items:center; gap:8px; margin-bottom:4px; }
.file-icon { font-size:18px; }
.file-name {
  font-size:14px; font-weight:700;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.file-type-badge {
  padding:2px 8px; border-radius:4px; font-size:9px; font-weight:800;
  text-transform:uppercase; letter-spacing:.5px; flex-shrink:0;
}
.badge-foto { background:#DCFCE7; color:#15803D; }
.badge-pdf { background:#FEE2E2; color:#B91C1C; }
.file-meta { font-size:11px; color:var(--t3); margin-bottom:8px; }
.file-actions { display:flex; gap:6px; flex-wrap:wrap; }
.dl-btn {
  padding:8px 16px; border-radius:var(--r3); border:none;
  font-size:11px; font-weight:700; font-family:inherit;
  cursor:pointer; display:inline-flex; align-items:center; gap:4px;
  transition:all .15s;
}
.dl-btn:hover { opacity:.88; }
.dl-btn:active { transform:scale(.95); }
.dl-btn.primary { background:var(--n1); color:#fff; }
.dl-btn.secondary { background:var(--s2); color:var(--t1); }
.dl-btn.pdf { background:var(--danger); color:#fff; }
.dl-btn.gold { background:var(--gd); color:var(--n1); }
.dl-btn:disabled { opacity:.5; cursor:not-allowed; transform:none; }


/* ===== LEGACY SECTION ===== */
.legacy-section { margin-top:32px; }
.legacy-title {
  font-family:'Playfair Display',serif; font-size:18px; font-weight:800;
  margin-bottom:14px; display:flex; align-items:center; gap:8px;
  color:var(--t2);
}
.legacy-title .badge {
  padding:3px 8px; border-radius:4px; font-family:'Manrope',sans-serif;
  font-size:10px; font-weight:700; background:rgba(212,168,83,.15);
  color:var(--gd2); text-transform:uppercase;
}

/* ===== EMPTY STATE ===== */
.empty-state { text-align:center; padding:60px 20px; color:var(--t3); }
.empty-state .icon { font-size:52px; margin-bottom:12px; }
.empty-state h3 { font-size:18px; color:var(--t2); margin-bottom:4px; font-weight:800; }
.empty-state p { font-size:13px; line-height:1.6; }

/* ===== LIGHTBOX ===== */
#lightbox {
  position:fixed; inset:0; background:rgba(0,0,0,.94);
  z-index:500; display:none; align-items:center; justify-content:center;
  flex-direction:column; cursor:pointer;
}
#lightbox.on { display:flex; }
#lightbox img {
  max-width:92vw; max-height:82vh; border-radius:8px;
  object-fit:contain; cursor:default;
  animation:lbIn .2s ease;
}
@keyframes lbIn { from{opacity:0;transform:scale(.95)} to{opacity:1;transform:scale(1)} }
.lb-close {
  position:absolute; top:16px; right:16px;
  width:44px; height:44px; background:rgba(255,255,255,.12);
  border:none; border-radius:50%; color:#fff; font-size:22px;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  font-weight:800; transition:background .2s;
}
.lb-close:hover { background:rgba(255,255,255,.25); }
.lb-caption {
  color:#fff; text-align:center; margin-top:12px;
  font-size:13px; opacity:.6; max-width:80vw;
}
.lb-bottom {
  position:absolute; bottom:24px; left:50%; transform:translateX(-50%);
  display:flex; align-items:center; gap:10px;
  background:rgba(12,31,61,.85); backdrop-filter:blur(12px);
  border-radius:var(--r1); padding:12px 20px;
  box-shadow:0 8px 32px rgba(0,0,0,.4);
}
.lb-counter {
  color:#fff; font-size:14px; font-weight:700; min-width:50px; text-align:center;
  padding-right:8px; border-right:1px solid rgba(255,255,255,.15);
}
.lb-action-btn {
  padding:10px 18px; border-radius:var(--r2); border:none;
  font-size:13px; font-weight:700;
  font-family:inherit; cursor:pointer; display:inline-flex; align-items:center; gap:6px;
  transition:all .2s; white-space:nowrap;
}
.lb-action-btn:active { transform:scale(.95); }
.lb-action-btn.lb-dl { background:var(--tl); color:var(--n1); }
.lb-action-btn.lb-dl:hover { background:var(--tl2); }
.lb-action-btn.lb-edit { background:rgba(255,255,255,.15); color:#fff; }
.lb-action-btn.lb-edit:hover { background:rgba(255,255,255,.3); }
.lb-action-btn.lb-del { background:rgba(229,62,62,.2); color:#ff8a8a; }
.lb-action-btn.lb-del:hover { background:var(--danger); color:#fff; }
.lb-nav {
  position:absolute; top:50%; transform:translateY(-50%);
  width:44px; height:44px; background:rgba(255,255,255,.1);
  border:none; border-radius:50%; color:#fff; font-size:20px;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition:background .2s;
}
.lb-nav:hover { background:rgba(255,255,255,.25); }
.lb-prev { left:16px; }
.lb-next { right:16px; }

/* ===== TOAST ===== */
.toast {
  position:fixed; bottom:24px; left:50%;
  transform:translateX(-50%) translateY(80px);
  padding:14px 24px; border-radius:var(--r2);
  font-size:13px; font-weight:600;
  box-shadow:0 8px 32px rgba(0,0,0,.25);
  z-index:600; transition:transform .4s cubic-bezier(.34,1.56,.64,1);
  max-width:90vw; pointer-events:none;
}
.toast.show { transform:translateX(-50%) translateY(0); }
.toast.success { background:var(--success); color:#fff; }
.toast.error { background:var(--danger); color:#fff; }
.toast.info { background:var(--n1); color:#fff; }

/* ===== PROGRESS OVERLAY ===== */
.progress-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.6);
  z-index:450; display:none; align-items:center; justify-content:center;
}
.progress-overlay.on { display:flex; }
.progress-box {
  background:var(--s1); border-radius:var(--r1); padding:32px;
  width:90%; max-width:360px; text-align:center;
  box-shadow:0 16px 48px rgba(0,0,0,.2);
}
.progress-box h3 { font-size:16px; font-weight:800; margin-bottom:12px; }
.progress-bar { height:6px; background:var(--s2); border-radius:3px; overflow:hidden; margin-bottom:8px; }
.progress-fill {
  height:100%; background:linear-gradient(90deg,var(--tl),var(--tl2));
  width:0%; transition:width .3s; border-radius:3px;
}
.progress-text { font-size:12px; color:var(--t2); }

/* ===== PC PHOTO EDITOR ===== */
#pcEditor {
  position:fixed; inset:0; z-index:500; background:rgba(0,0,0,.95);
  display:none; flex-direction:column;
}
#pcEditor.on { display:flex; }
#pcEditor .pce-top {
  padding:12px 20px; display:flex; align-items:center; justify-content:space-between;
  flex-shrink:0; z-index:2;
}
#pcEditor .pce-title { color:#fff; font-size:16px; font-weight:700; }
#pcEditor .pce-btn {
  padding:10px 20px; border-radius:var(--r2); border:none; font-size:13px;
  font-weight:700; font-family:inherit; cursor:pointer; display:inline-flex;
  align-items:center; gap:6px; transition:all .15s;
}
#pcEditor .pce-btn:hover { opacity:.9; }
#pcEditor .pce-btn.close { background:rgba(255,255,255,.15); color:#fff; }
#pcEditor .pce-btn.save { background:var(--tl); color:var(--n1); }
#pcEditor .pce-btn.danger { background:var(--danger); color:#fff; }
#pcEditor .pce-btn.crop { background:rgba(255,255,255,.15); color:#fff; }
#pcEditor .pce-wrap {
  flex:1; position:relative; overflow:hidden;
  display:flex; align-items:center; justify-content:center;
  padding:20px;
}
#pcEditor .pce-wrap img {
  max-width:70vw; max-height:65vh; object-fit:contain;
  border-radius:8px; user-select:none; pointer-events:none;
}
#pcEditor .pce-crop {

/* =========================================================

function escHtml(s) {

function getInitials(name) {
  if (!name) return '?';
  return name.split(' ').map(function(w) { return w[0]; }).join('').substring(0, 2).toUpperCase();
}

function todayStr() { return new Date().toISOString().split('T')[0]; }

function formatDate(d) {
  var months = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  var dt = new Date(d + 'T12:00:00');
  return dt.getDate() + ' ' + months[dt.getMonth()] + ' ' + dt.getFullYear();
}

function fmtSize(b) {
  if (!b) return '';
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
  return (b / 1048576).toFixed(1) + ' MB';
}

function timeAgo(iso) {
  if (!iso) return 'Desconocido';
  var diff = Date.now() - new Date(iso).getTime();
  var m = diff / 60000;
  if (m < 1) return 'Ahora mismo';
  if (m < 2) return 'Hace 1 min';
  if (m < 60) return 'Hace ' + Math.round(m) + ' min';
  var h = m / 60;
  if (h < 2) return 'Hace 1 hora';
  if (h < 24) return 'Hace ' + Math.round(h) + ' horas';
  var d = h / 24;
  if (d < 2) return 'Hace 1 dia';
  return 'Hace ' + Math.round(d) + ' dias';
}

function activityInfo(iso) {
  if (!iso) return { label: 'Desconocido', color: 'gray', minutes: Infinity };
  var m = (Date.now() - new Date(iso).getTime()) / 60000;
  if (m < 15) return { label: 'Activo', color: 'green', minutes: m };
  if (m < 60) return { label: timeAgo(iso), color: 'yellow', minutes: m };
  return { label: timeAgo(iso), color: 'gray', minutes: m };
}

function pubUrl(path) {

/* =========================================================

async function sbList(prefix) {

  });
  var data = await res.json();
  return Array.isArray(data) ? data : [];
}

async function sbDelete(paths) {

  });

  if (!res.ok) {
    // Try alternative format without prefixes wrapper

      body: JSON.stringify(paths)
    });
    var body2 = await res2.clone().text();
    console.log('Alt delete response:', res2.status, body2);
    return res2;
  }
  return res;
}

/* =========================================================
   FILE GROUPING
   ========================================================= */
function groupFiles(rawFiles, pathPrefix) {
  var groups = {};
  for (var i = 0; i < rawFiles.length; i++) {
    var f = rawFiles[i];
    if (!f.id || !f.name) continue;
    if (f.name === 'profile.json') continue;
    if (f.name.match(/_thumb\.(jpg|jpeg|png)$/i)) continue;

    // Real PDF file
    if (f.name.match(/\.pdf$/i)) {
      var pdfClean = f.name.replace(/^\d+_/, '').replace(/\.pdf$/i, '');
      var pdfKey = '_pdf_' + pdfClean;
      if (!groups[pdfKey]) {
        groups[pdfKey] = { name: pdfClean, type: 'pdf-file', pdfUrl: pubUrl(pathPrefix + '/' + f.name), pages: [], totalSize: 0, rawName: f.name };
      }
      groups[pdfKey].pdfUrl = pubUrl(pathPrefix + '/' + f.name);
      groups[pdfKey].totalSize += (f.metadata && f.metadata.size) || 0;
      continue;
    }

    var clean = f.name.replace(/^\d+_/, '');
    var m = clean.match(/^(.+)_pag(\d+)\.(jpg|jpeg|png)$/i);
    if (m) {
      var base = m[1];
      if (!groups[base]) groups[base] = { name: base, type: 'pdf', pages: [], totalSize: 0 };
      groups[base].pages.push({ file: f, num: parseInt(m[2]), url: pubUrl(pathPrefix + '/' + f.name), rawName: f.name });
      groups[base].totalSize += (f.metadata && f.metadata.size) || 0;
    } else {
      var dname = clean.replace(/\.(jpg|jpeg|png)$/i, '');
      var key = '_s_' + f.name;
      groups[key] = {
        name: dname, type: 'foto',
        pages: [{ file: f, num: 1, url: pubUrl(pathPrefix + '/' + f.name), rawName: f.name }],
        totalSize: (f.metadata && f.metadata.size) || 0
      };
    }
  }

  // Link PDF files with their multi-page image groups
  var keys = Object.keys(groups);
  for (var k = 0; k < keys.length; k++) {
    var g = groups[keys[k]];
    if (g.type === 'pdf') {
      var pdfKey2 = '_pdf_' + g.name;
      if (groups[pdfKey2]) {
        g.pdfUrl = groups[pdfKey2].pdfUrl;
        g.totalSize += groups[pdfKey2].totalSize;
        delete groups[pdfKey2];
      }
    }
  }

  var result = [];
  keys = Object.keys(groups);
  for (var j = 0; j < keys.length; j++) {
    var gr = groups[keys[j]];
    gr.pages.sort(function(a, b) { return a.num - b.num; });
    result.push(gr);
  }
  return result;
}

/* =========================================================
   LOAD ALL DATA
   ========================================================= */
async function loadAllData() {
  if (isLoading) return;
  isLoading = true;
  resetCountdown();

  var container = document.getElementById('workersContainer');
  var isFirstLoad = allWorkers.length === 0;

  if (isFirstLoad) {
    container.innerHTML = buildSkeletonGrid();
  }

  try {
    // 1. List all items at bucket root
    var rootItems = await sbList('');
    var rootFolders = rootItems.filter(function(i) { return i.id === null && i.name; });

    // 2. Build search prefixes: each servicio + legacy workers/
    var searchPrefixes = [];
    for (var sk = 0; sk < SERVICIOS_KEYS.length; sk++) {
      var sKey = SERVICIOS_KEYS[sk];
      if (rootFolders.some(function(f) { return f.name === sKey; })) {
        searchPrefixes.push({ servicio: sKey, prefix: sKey + '/workers/' });
      }
    }
    if (rootFolders.some(function(f) { return f.name === 'workers'; })) {
      searchPrefixes.push({ servicio: '', prefix: 'workers/' });
    }

    var legacyNames = rootFolders.filter(function(f) {
      return f.name !== 'workers' && f.name !== '.emptyFolderPlaceholder' && !SERVICIOS[f.name];
    }).map(function(f) { return f.name; });

    // 3. Load workers from all servicios in parallel
    var workers = [];
    allWorkerPaths = {};

    var prefixResults = await Promise.all(searchPrefixes.map(function(sp) {
      return sbList(sp.prefix).then(function(items) {
        return { servicio: sp.servicio, prefix: sp.prefix, folders: items.filter(function(i) { return i.id === null && i.name; }) };
      }).catch(function() { return { servicio: sp.servicio, prefix: sp.prefix, folders: [] }; });
    }));

    // Collect all folder entries with their base paths
    var allEntries = [];
    for (var pr = 0; pr < prefixResults.length; pr++) {
      var pRes = prefixResults[pr];
      for (var fi = 0; fi < pRes.folders.length; fi++) {
        allEntries.push({
          name: pRes.folders[fi].name,
          basePath: pRes.prefix + pRes.folders[fi].name,
          servicio: pRes.servicio
        });
      }
    }

    // Fetch all profiles in parallel
    var profilePromises = allEntries.map(function(entry) {
      return fetch(SB_URL + '/storage/v1/object/' + BUCKET + '/' + entry.basePath + '/profile.json', {
        headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY },
        cache: 'no-store'
      }).then(function(r) { return r.ok ? r.json() : null; })
        .catch(function() { return null; });
    });
    var profiles = await Promise.all(profilePromises);

    for (var i = 0; i < allEntries.length; i++) {
      var p = profiles[i];
      if (!p) {
        p = { name: allEntries[i].name, area: '' };
      }
      p._folder = allEntries[i].name;
      p._basePath = allEntries[i].basePath;
      p._servicio = allEntries[i].servicio || p.servicio || '';
      allWorkerPaths[p._folder] = p._basePath;
      workers.push(p);
    }

    // Sort by most recently active
    workers.sort(function(a, b) {
      return (b.last_active || '').localeCompare(a.last_active || '');
    });

    allWorkers = workers;

    // 4. Preload date folders for each worker (for stats)
    var todayS = todayStr();
    var totalDocs = 0;
    var docsToday = 0;
    var activeCount = 0;

    var datePromises = workers.map(function(w) {
      return sbList(w._basePath + '/').catch(function() { return []; });
    });
    var dateResults = await Promise.all(datePromises);

    for (var wi = 0; wi < workers.length; wi++) {
      var wId = workers[wi]._folder || workers[wi].worker_id;
      var dateItems = dateResults[wi].filter(function(i) {
        return i.id === null && i.name && i.name.match(/^\d{4}-\d{2}-\d{2}$/);
      });
      dateItems.sort(function(a, b) { return b.name.localeCompare(a.name); });

      allWorkerFiles[wId] = { dates: dateItems.map(function(d) { return d.name; }), loaded: {} };

      // Count dates for total docs estimate
      totalDocs += dateItems.length;
      if (dateItems.some(function(d) { return d.name === todayS; })) docsToday++;

      var act = activityInfo(workers[wi].last_active);
      if (act.color === 'green') activeCount++;
    }

    // 5. Load legacy folders structure
    legacyFolders = [];
    for (var li = 0; li < legacyNames.length; li++) {
      legacyFolders.push({ name: legacyNames[li] });
    }

    // 6. Update stats
    document.getElementById('statsBar').style.display = 'grid';
    document.getElementById('statWorkers').textContent = activeCount;
    document.getElementById('statDocsToday').textContent = docsToday;
    document.getElementById('statTotalDocs').textContent = totalDocs;
    document.getElementById('statTotalWorkers').textContent = workers.length;

    // 7. Render (skip DOM rebuild on auto-refresh if no new workers)
    var shouldRender = isFirstLoad || !autoRefreshing;
    if (shouldRender) {
      lbRegId = 0; lbRegistry = {};
      if (currentWorkerId) {
        renderDetailView(currentWorkerId);
      } else {
        renderDirectory();
      }
      renderLegacy();
    } else {
      // Silent refresh: only update stats, don't rebuild DOM
    }

    // 8. Auto-cleanup files older than 3 months (silent, in background)
    autoCleanup();

  } catch (err) {
    console.error('Load error:', err);
    container.innerHTML = '<div class="empty-state"><div class="icon">&#9888;</div><h3>Error de conexion</h3><p>' + escHtml(err.message) + '</p></div>';
  }

  isLoading = false;
}

/* =========================================================
   RENDER WORKER DIRECTORY
   ========================================================= */
function renderDirectory() {
  var container = document.getElementById('workersContainer');
  var query = document.getElementById('searchInput').value.toLowerCase().trim();

  var threeMonthsMs = 90 * 24 * 60 * 60 * 1000;
  var now = Date.now();

  // Hide workers inactive for more than 3 months (keep those without date)
  var active = allWorkers.filter(function(w) {
    if (!w.last_active) return true;
    return (now - new Date(w.last_active).getTime()) < threeMonthsMs;
  });

  var filtered = active;
  if (query) {
    filtered = active.filter(function(w) {
      return w.name.toLowerCase().includes(query) || (w.area || '').toLowerCase().includes(query);
    });
  }

  // Filter by servicio
  if (servicioFilter && servicioFilter !== 'all') {
    filtered = filtered.filter(function(w) {
      var ws = w._servicio || w.servicio || '';
      if (servicioFilter === 'legacy') return !ws;
      return ws === servicioFilter;
    });
  }

  if (!filtered.length) {
    if (allWorkers.length === 0) {
      container.innerHTML = '<div class="empty-state"><div class="icon">&#128101;</div><h3>Sin trabajadores</h3><p>Cuando el personal se registre en la app movil, apareceran aqui.</p></div>';
    } else {
      container.innerHTML = '<div class="empty-state"><div class="icon">&#128269;</div><h3>Sin resultados</h3><p>No se encontraron trabajadores con esos filtros</p></div>';
    }
    return;
  }

  var html = '<div class="workers-grid">';
  for (var i = 0; i < filtered.length; i++) {
    var w = filtered[i];
    var act = activityInfo(w.last_active);
    var wId = w._folder || w.worker_id;
    var fileInfo = allWorkerFiles[wId];
    var dateCount = fileInfo ? fileInfo.dates.length : 0;
    var sLabel = w._servicio && SERVICIOS[w._servicio] ? SERVICIOS[w._servicio].label : '';

    html += '<div class="worker-card" onclick="openWorkerDetail(\'' + escHtml(wId) + '\')">';
    html += '<div class="avatar md" style="background:' + (w.avatar_color || '#4ECDC4') + '">';
    html += getInitials(w.name);
    html += '<span class="activity-dot ' + act.color + '"></span>';
    html += '</div>';
    html += '<div class="worker-info">';
    html += '<div class="worker-name">' + escHtml(w.name) + '</div>';
    html += '<div class="worker-area">' + escHtml(w.area || 'Sin area') + (sLabel ? ' &middot; ' + escHtml(sLabel) : '') + '</div>';
    html += '<div class="worker-time">' + act.label + (dateCount > 0 ? ' &middot; ' + dateCount + ' fecha(s)' : '') + '</div>';
    html += '</div>';
    html += '<span class="worker-arrow">&rsaquo;</span>';
    html += '</div>';
  }
  html += '</div>';
  container.innerHTML = html;
}

function buildSkeletonGrid() {

async function toggleLegacyFolder(fname) {
  expandedLegacy[fname] = !expandedLegacy[fname];
  renderLegacy();
  if (expandedLegacy[fname]) {
    loadLegacyFolder(fname);
  }
}

async function loadLegacyFolder(fname) {
  var el = document.getElementById('legacy_' + fname);
  if (!el) return;
  var lf = legacyFolders.find(function(f) { return f.name === fname; });
  if (lf && lf._loaded && lf._docs) {
    renderLegacyFiles(el, lf._docs, fname);
    return;
  }

  el.innerHTML = '<div style="padding:20px;text-align:center;color:var(--t3)"><div class="skel-line" style="width:60%;margin:0 auto 8px"></div><div class="skel-line" style="width:40%;margin:0 auto"></div></div>';

  try {
    var items = await sbList(fname + '/');
    var docs = groupFiles(items, fname);
    if (lf) { lf._loaded = true; lf._docs = docs; }
    renderLegacyFiles(el, docs, fname);
  } catch (e) {
    el.innerHTML = '<div style="padding:16px;color:var(--danger);font-size:12px">Error: ' + escHtml(e.message) + '</div>';
  }
}

function renderLegacyFiles(el, docs, folderName) {
  if (!docs.length) {
    el.innerHTML = '<div style="padding:16px;text-align:center;color:var(--t3);font-size:12px">Sin archivos</div>';
    return;
  }
  var html = '';
  for (var i = 0; i < docs.length; i++) {
    html += renderFileCard(docs[i], folderName);
  }
  el.innerHTML = html;
}

async function dlLegacyZip(fname) {
  if (!window.JSZip) { showToast('JSZip no cargado', 'error'); return; }
  var lf = legacyFolders.find(function(f) { return f.name === fname; });
  if (!lf || !lf._docs) {
    showToast('Carga la carpeta primero', 'info');
    return;
  }
  await downloadDocsAsZip(lf._docs, fname.replace(/_/g, ' '));
}

/* =========================================================
   RENDER DETAIL VIEW
   ========================================================= */
function groupDatesByMonth(dates) {
  var monthNames = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  var groups = [];
  var map = {};

  for (var i = 0; i < dates.length; i++) {
    var d = dates[i];
    var parts = d.split('-');
    var key = parts[0] + '-' + parts[1]; // YYYY-MM
    if (!map[key]) {
      map[key] = { key: key, label: monthNames[parseInt(parts[1]) - 1] + ' ' + parts[0], dates: [] };
      groups.push(map[key]);
    }
    map[key].dates.push(d);
  }

  return groups;
}

function renderDetailView(wId) {
  var detailEl = document.getElementById('viewDetail');
  var w = allWorkers.find(function(x) { return (x._folder || x.worker_id) === wId; });
  if (!w) {
    detailEl.innerHTML = '<div class="empty-state"><h3>Trabajador no encontrado</h3></div>';
    return;
  }

  var act = activityInfo(w.last_active);
  var fileInfo = allWorkerFiles[wId];
  var dates = fileInfo ? fileInfo.dates : [];

  // Apply date filter
  var dateFilter = document.getElementById('dateFilter').value;
  var filteredDates = filterDates(dates, dateFilter);

  var html = '';

  // Header
  html += '<div class="detail-header">';
  html += '<button class="detail-back" onclick="closeDetail()" title="Volver">';
  html += '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="m15 18-6-6 6-6"/></svg>';
  html += '</button>';
  html += '<div class="avatar lg" style="background:' + (w.avatar_color || '#4ECDC4') + '">' + getInitials(w.name) + '</div>';
  html += '<div class="detail-info">';
  html += '<div class="detail-name">' + escHtml(w.name) + '</div>';
  html += '<div class="detail-area-row">';
  var sLabel = w._servicio && SERVICIOS[w._servicio] ? SERVICIOS[w._servicio].label : '';
  html += '<span class="detail-area">' + escHtml(w.area || 'Sin area') + (sLabel ? ' &middot; ' + escHtml(sLabel) : '') + '</span>';
  if (w.turno) html += '<span class="detail-area" style="background:rgba(212,168,83,.1);color:var(--gd2)">Turno ' + escHtml(w.turno) + '</span>';
  html += '<span class="detail-activity"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--' + (act.color === 'green' ? 'success' : act.color === 'yellow' ? 'warn' : 't3') + ');vertical-align:middle;margin-right:4px"></span>' + act.label + '</span>';
  html += '</div></div>';
  html += '<div class="detail-actions">';
  html += '<button class="dl-btn gold" onclick="dlWorkerZip(\'' + escHtml(wId) + '\')">&#128230; Descargar todo ZIP</button>';
  html += '</div>';
  html += '</div>';

  // Group dates by month
  if (!filteredDates.length) {
    html += '<div class="empty-state"><div class="icon">&#128196;</div><h3>Sin archivos</h3><p>No hay archivos en el rango seleccionado.</p></div>';
  } else {
    var monthGroups = groupDatesByMonth(filteredDates);
    var todayS = todayStr();
    var currentMonth = todayS.substring(0, 7); // YYYY-MM

    for (var mi = 0; mi < monthGroups.length; mi++) {
      var mg = monthGroups[mi];
      var isCurrentMonth = mg.key === currentMonth;
      var monthKey = wId + '_month_' + mg.key;
      var monthOpen = expandedDates[monthKey] !== undefined ? expandedDates[monthKey] : (mi === 0); // First month always open

      html += '<div class="month-group">';
      html += '<div class="month-header" onclick="toggleMonth(\'' + escHtml(wId) + '\',\'' + mg.key + '\')">';
      html += '<span class="month-arrow' + (monthOpen ? ' open' : '') + '">&#9654;</span>';
      html += '<h2>' + mg.label + (isCurrentMonth ? ' <span style="font-family:Manrope;font-size:11px;font-weight:700;background:var(--tl);color:var(--n1);padding:2px 8px;border-radius:4px;vertical-align:middle;margin-left:6px">MES ACTUAL</span>' : '') + '</h2>';
      html += '<span class="month-count">' + mg.dates.length + ' dia(s)</span>';
      html += '</div>';
      html += '<div class="month-body' + (monthOpen ? ' open' : '') + '">';

      if (monthOpen) {
        for (var i = 0; i < mg.dates.length; i++) {
          var date = mg.dates[i];
          var isToday = date === todayS;
          var dateKey = wId + '_' + date;
          var isOpen = expandedDates[dateKey] !== undefined ? expandedDates[dateKey] : isToday;
          var loaded = fileInfo && fileInfo.loaded[date];

          html += '<div class="date-section">';
          html += '<div class="date-header' + (isOpen ? ' open' : '') + '" onclick="event.stopPropagation();toggleDateSection(\'' + escHtml(wId) + '\',\'' + date + '\')">';
          html += '<span class="date-arrow' + (isOpen ? ' open' : '') + '">&#9654;</span>';
          html += '<div class="date-title"><h3>' + formatDate(date);
          if (isToday) html += ' <span class="today-badge">Hoy</span>';
          html += '</h3>';
          if (loaded) {
            html += '<div class="count">' + loaded.length + ' archivo(s)</div>';
          }
          html += '</div>';
          html += '<div class="date-actions">';
          html += '<button class="date-btn" onclick="event.stopPropagation();dlDateZip(\'' + escHtml(wId) + '\',\'' + date + '\')">&#128230; ZIP</button>';
          html += '</div>';
          html += '</div>';

          html += '<div class="date-body' + (isOpen ? ' open' : '') + '" id="dbody_' + dateKey.replace(/[^a-zA-Z0-9_-]/g, '_') + '">';
          if (isOpen && loaded) {
            for (var fi = 0; fi < loaded.length; fi++) {
              html += renderFileCard(loaded[fi], (allWorkerPaths[wId] || 'workers/' + wId) + '/' + date);
            }
            if (!loaded.length) {
              html += '<div style="padding:16px;text-align:center;color:var(--t3);font-size:12px">Sin archivos</div>';
            }
          } else if (isOpen) {
            html += '<div style="padding:20px;text-align:center;color:var(--t3)"><div class="skel-line" style="width:60%;margin:0 auto 8px"></div><div class="skel-line" style="width:40%;margin:0 auto"></div></div>';
          }
          html += '</div>';
          html += '</div>';
        }
      }

      html += '</div>'; // month-body
      html += '</div>'; // month-group
    }
  }

  detailEl.innerHTML = html;

  // Load files for expanded dates
  for (var d = 0; d < filteredDates.length; d++) {
    var dd = filteredDates[d];
    var dk = wId + '_' + dd;
    var ddMonth = dd.substring(0, 7);
    var monthK = wId + '_month_' + ddMonth;
    var monthIsOpen = expandedDates[monthK] !== undefined ? expandedDates[monthK] : (filteredDates.indexOf(dd) < groupDatesByMonth(filteredDates)[0].dates.length);
    var isExp = expandedDates[dk] !== undefined ? expandedDates[dk] : (dd === todayStr());
    if (monthIsOpen && isExp && !(fileInfo && fileInfo.loaded[dd])) {
      loadDateFiles(wId, dd);
    }
  }
}

/* =========================================================
   DATE FILTERING
   ========================================================= */
function filterDates(dates, filterVal) {
  if (filterVal === 'all') return dates;
  var now = new Date();
  var todayS = todayStr();

  return dates.filter(function(d) {
    if (filterVal === 'today') return d === todayS;
    var dt = new Date(d + 'T12:00:00');
    if (filterVal === 'week') {
      var weekAgo = new Date(now);
      weekAgo.setDate(weekAgo.getDate() - 7);
      return dt >= weekAgo;
    }
    if (filterVal === 'month') {
      var monthAgo = new Date(now);
      monthAgo.setMonth(monthAgo.getMonth() - 1);
      return dt >= monthAgo;
    }
    return true;
  });
}

function applyFilters() {
  if (currentWorkerId) {
    renderDetailView(currentWorkerId);
  } else {
    renderDirectory();
  }
}

/* =========================================================
   DATE SECTION TOGGLE & FILE LOADING
   ========================================================= */
function toggleMonth(wId, monthKey) {
  var mk = wId + '_month_' + monthKey;
  var wasOpen = expandedDates[mk] !== undefined ? expandedDates[mk] : true;
  expandedDates[mk] = !wasOpen;
  renderDetailView(wId);
}

function toggleDateSection(wId, date) {
  var dk = wId + '_' + date;
  var wasOpen = expandedDates[dk] !== undefined ? expandedDates[dk] : (date === todayStr());
  expandedDates[dk] = !wasOpen;
  renderDetailView(wId);
}

async function loadDateFiles(wId, date) {
  var fileInfo = allWorkerFiles[wId];
  if (!fileInfo) return;
  if (fileInfo.loaded[date]) return;

  try {
    var items = await sbList((allWorkerPaths[wId] || 'workers/' + wId) + '/' + date + '/');
    var docs = groupFiles(items, (allWorkerPaths[wId] || 'workers/' + wId) + '/' + date);
    fileInfo.loaded[date] = docs;
    if (currentWorkerId === wId) {
      renderDetailView(wId);
    }
  } catch (e) {
    var dk = wId + '_' + date;
    var bodyEl = document.getElementById('dbody_' + dk.replace(/[^a-zA-Z0-9_-]/g, '_'));
    if (bodyEl) {
      bodyEl.innerHTML = '<div style="padding:16px;color:var(--danger);font-size:12px">Error al cargar: ' + escHtml(e.message) + '</div>';
    }
  }
}

/* =========================================================
   RENDER FILE CARD
   ========================================================= */
function renderFileCard(doc, pathPrefix) {
  var thumbSrc = doc.pages.length > 0 ? doc.pages[0].url : '';
  var typeBadge = '';
  var typeClass = '';
  var meta = '';

  if (doc.type === 'foto') {
    typeBadge = 'FOTO'; typeClass = 'badge-foto';
    meta = 'Foto &middot; ' + fmtSize(doc.totalSize);
  } else if (doc.type === 'pdf-file') {
    typeBadge = 'PDF'; typeClass = 'badge-pdf';
    meta = 'PDF &middot; ' + fmtSize(doc.totalSize);
  } else {
    typeBadge = 'PDF'; typeClass = 'badge-pdf';
    meta = 'PDF &middot; ' + doc.pages.length + ' pags &middot; ' + fmtSize(doc.totalSize);
  }

  var html = '<div class="file-card">';

  if (thumbSrc) {
    var lbData = doc.pages.map(function(p) { return { url: p.url, caption: doc.name + (doc.pages.length > 1 ? ' - Pag ' + p.num : ''), path: pathPrefix + '/' + p.rawName }; });
    var rid = 'lb' + (lbRegId++);
    lbRegistry[rid] = lbData;
    html += '<img class="file-thumb" src="' + thumbSrc + '" onclick="openLbReg(\'' + rid + '\',0)" onerror="this.style.background=\'var(--s2)\';this.style.border=\'1px dashed var(--bd)\'">';
  } else {
    html += '<div class="file-thumb" style="display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--t3)">&#128196;</div>';
  }

  html += '<div class="file-content">';
  html += '<div class="file-head">';
  html += '<span class="file-name">' + escHtml(doc.name) + '</span>';
  html += '<span class="file-type-badge ' + typeClass + '">' + typeBadge + '</span>';
  html += '</div>';
  html += '<div class="file-meta">' + meta + '</div>';
  html += '<div class="file-actions">';

  if (doc.type === 'pdf-file') {
    html += '<button class="dl-btn pdf" onclick="forceDl(\'' + doc.pdfUrl + '\',\'' + escHtml(doc.name) + '.pdf\')">&#128196; Descargar PDF</button>';
  } else if (doc.type === 'pdf') {
    if (doc.pdfUrl) {
      html += '<button class="dl-btn pdf" onclick="forceDl(\'' + doc.pdfUrl + '\',\'' + escHtml(doc.name) + '.pdf\')">&#128196; Descargar PDF</button>';
    } else {
      html += '<button class="dl-btn pdf" onclick="generatePdf(this)" data-doc="' + escHtml(JSON.stringify({ name: doc.name, pages: doc.pages.map(function(p) { return { url: p.url }; }) })) + '">&#128196; Generar PDF</button>';
    }
    html += '<button class="dl-btn secondary" onclick="dlMultipleImages(this)" data-pages="' + escHtml(JSON.stringify(doc.pages.map(function(p) { return { url: p.url, name: doc.name + '_pag' + p.num + '.jpg' }; }))) + '">&#128444; Imagenes</button>';
  } else {
    html += '<button class="dl-btn primary" onclick="forceDl(\'' + doc.pages[0].url + '\',\'' + escHtml(doc.name) + '.jpg\')">&#128190; Descargar JPG</button>';
  }

  html += '</div>';

  // Page count indicator for multi-page documents
  if (doc.pages.length > 1) {
    html += '<div style="margin-top:6px;font-size:11px;color:var(--t3);font-weight:600">' + doc.pages.length + ' paginas &middot; Click en la imagen para ver todas</div>';
  }

  html += '</div></div>';
  return html;
}

/* =========================================================
   DOWNLOADS
   ========================================================= */
async function forceDl(url, filename) {
  try {
    showToast('Descargando: ' + filename, 'info');
    var res = await fetch(url, { cache: 'no-store' });
    var blob = await res.blob();
    var blobUrl = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = blobUrl;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function() { URL.revokeObjectURL(blobUrl); }, 2000);
    showToast('Descargado: ' + filename, 'success');
  } catch (e) {
    console.error('Download error:', e);
    window.open(url, '_blank');
  }
}

function dlMultipleImages(btn) {
  try {
    var pages = JSON.parse(btn.getAttribute('data-pages'));
    showToast('Descargando ' + pages.length + ' imagenes...', 'info');
    for (var i = 0; i < pages.length; i++) {
      (function(pg, delay) {
        setTimeout(function() { forceDl(pg.url, pg.name); }, delay);
      })(pages[i], i * 800);
    }
  } catch (e) {
    showToast('Error al descargar', 'error');
  }
}

/* =========================================================
   PDF GENERATION
   ========================================================= */
async function generatePdf(btn) {
  if (!window.jspdf) { showToast('jsPDF no cargado aun', 'error'); return; }
  var docData;
  try { docData = JSON.parse(btn.getAttribute('data-doc')); } catch (e) { return; }

  btn.disabled = true;
  var origText = btn.innerHTML;
  btn.innerHTML = '&#9203; Generando...';

  try {
    var pdf = new jspdf.jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

    for (var i = 0; i < docData.pages.length; i++) {
      if (i > 0) pdf.addPage();
      var img = await loadImage(docData.pages[i].url);
      var pw = pdf.internal.pageSize.getWidth();
      var ph = pdf.internal.pageSize.getHeight();
      var ratio = Math.min(pw / img.width, ph / img.height);
      var w = img.width * ratio;
      var h = img.height * ratio;
      pdf.addImage(img.src, 'JPEG', (pw - w) / 2, (ph - h) / 2, w, h);
    }

    pdf.save(docData.name + '.pdf');
    showToast('PDF generado: ' + docData.name, 'success');
  } catch (e) {
    showToast('Error generando PDF: ' + e.message, 'error');
    console.error(e);
  }

  btn.disabled = false;
  btn.innerHTML = origText;
}

function loadImage(url) {
  return new Promise(function(resolve, reject) {
    var img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = function() { resolve(img); };
    img.onerror = function() { reject(new Error('No se pudo cargar imagen')); };
    img.src = url;
  });
}

async function downloadDocsAsZip(docs, zipName) {
  if (!window.JSZip) { showToast('JSZip no cargado', 'error'); return; }
  showProgress('Preparando ZIP: ' + zipName);

  try {
    var zip = new JSZip();
    var folder = zip.folder(zipName);
    var total = 0;
    for (var d = 0; d < docs.length; d++) {
      total += docs[d].pages.length;
      if (docs[d].pdfUrl) total++;
    }

    var done = 0;
    for (var di = 0; di < docs.length; di++) {
      var doc = docs[di];
      for (var pi = 0; pi < doc.pages.length; pi++) {
        var pageSuffix = doc.pages.length > 1 ? '_pag' + doc.pages[pi].num : '';
        var fileName = doc.name + pageSuffix + '.jpg';
        try {
          var res = await fetch(doc.pages[pi].url);
          var blob = await res.blob();
          folder.file(fileName, blob);
        } catch (e) {
          console.warn('Skip:', fileName);
        }
        done++;
        updateProgress((done / total) * 90, 'Descargando archivos... ' + done + '/' + total);
      }
      if (doc.pdfUrl) {
        try {
          var pdfRes = await fetch(doc.pdfUrl);
          var pdfBlob = await pdfRes.blob();
          folder.file(doc.name + '.pdf', pdfBlob);
        } catch (e) {}
        done++;
        updateProgress((done / total) * 90);
      }
    }

    updateProgress(95, 'Generando ZIP...');
    var content = await zip.generateAsync({ type: 'blob' });
    var url = URL.createObjectURL(content);
    var a = document.createElement('a');
    a.href = url;
    a.download = zipName + '.zip';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function() { URL.revokeObjectURL(url); }, 2000);

    updateProgress(100, 'Completado!');
    setTimeout(hideProgress, 800);
    showToast('ZIP descargado: ' + zipName, 'success');
  } catch (e) {
    hideProgress();
    showToast('Error creando ZIP: ' + e.message, 'error');
    console.error(e);
  }
}

async function dlDateZip(wId, date) {
  var fileInfo = allWorkerFiles[wId];
  if (!fileInfo || !fileInfo.loaded[date]) {
    showToast('Espera a que carguen los archivos', 'info');
    await loadDateFiles(wId, date);
    fileInfo = allWorkerFiles[wId];
    if (!fileInfo || !fileInfo.loaded[date]) return;
  }
  var docs = fileInfo.loaded[date];
  if (!docs.length) { showToast('Sin archivos en esta fecha', 'info'); return; }

  var w = allWorkers.find(function(x) { return (x._folder || x.worker_id) === wId; });
  var wName = w ? w.name.replace(/\s+/g, '_') : wId;
  await downloadDocsAsZip(docs, wName + '_' + date);
}

async function dlWorkerZip(wId) {
  var fileInfo = allWorkerFiles[wId];
  if (!fileInfo) return;

  var w = allWorkers.find(function(x) { return (x._folder || x.worker_id) === wId; });
  var wName = w ? w.name.replace(/\s+/g, '_') : wId;

  if (!window.JSZip) { showToast('JSZip no cargado', 'error'); return; }
  showProgress('Preparando ZIP de ' + (w ? w.name : wId));

  try {
    var zip = new JSZip();
    var rootFolder = zip.folder(wName);
    var dates = fileInfo.dates;
    var totalDates = dates.length;

    for (var di = 0; di < dates.length; di++) {
      var date = dates[di];
      updateProgress((di / totalDates) * 80, 'Cargando ' + date + '...');

      // Load files if not already loaded
      if (!fileInfo.loaded[date]) {
        try {
          var items = await sbList((allWorkerPaths[wId] || 'workers/' + wId) + '/' + date + '/');
          var docs = groupFiles(items, (allWorkerPaths[wId] || 'workers/' + wId) + '/' + date);
          fileInfo.loaded[date] = docs;
        } catch (e) {
          console.warn('Skip date:', date);
          continue;
        }
      }

      var dateDocs = fileInfo.loaded[date];
      if (!dateDocs.length) continue;

      var dateFolder = rootFolder.folder(date);

      for (var fi = 0; fi < dateDocs.length; fi++) {
        var doc = dateDocs[fi];
        for (var pi = 0; pi < doc.pages.length; pi++) {
          var pageSuffix = doc.pages.length > 1 ? '_pag' + doc.pages[pi].num : '';
          var fileName = doc.name + pageSuffix + '.jpg';
          try {
            var res = await fetch(doc.pages[pi].url);
            var blob = await res.blob();
            dateFolder.file(fileName, blob);
          } catch (e) {}
        }
        if (doc.pdfUrl) {
          try {
            var pdfRes = await fetch(doc.pdfUrl);
            var pdfBlob = await pdfRes.blob();
            dateFolder.file(doc.name + '.pdf', pdfBlob);
          } catch (e) {}
        }
      }
    }

    updateProgress(90, 'Generando ZIP...');
    var content = await zip.generateAsync({ type: 'blob' });
    var url = URL.createObjectURL(content);
    var a = document.createElement('a');
    a.href = url;
    a.download = wName + '_todos.zip';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function() { URL.revokeObjectURL(url); }, 2000);

    updateProgress(100, 'Completado!');
    setTimeout(hideProgress, 800);
    showToast('ZIP descargado: ' + wName, 'success');
  } catch (e) {
    hideProgress();
    showToast('Error creando ZIP: ' + e.message, 'error');
    console.error(e);
  }
}

/* =========================================================
   AUTO-CLEANUP: delete files older than 3 months
   ========================================================= */
async function autoCleanup() {
  var cutoff = new Date();
  cutoff.setMonth(cutoff.getMonth() - 3);
  var cutoffStr = cutoff.toISOString().split('T')[0];

  var toDelete = [];

  for (var i = 0; i < allWorkers.length; i++) {
    var wId = allWorkers[i]._folder || allWorkers[i].worker_id;
    var fileInfo = allWorkerFiles[wId];
    if (!fileInfo) continue;

    for (var d = 0; d < fileInfo.dates.length; d++) {
      var date = fileInfo.dates[d];
      if (date < cutoffStr) {
        toDelete.push({ wId: wId, date: date });
      }
    }
  }

  if (!toDelete.length) return;

  console.log('Auto-cleanup: eliminando ' + toDelete.length + ' carpeta(s) de mas de 3 meses');

  var deleted = 0;
  for (var j = 0; j < toDelete.length; j++) {
    try {
      var path = (allWorkerPaths[toDelete[j].wId] || 'workers/' + toDelete[j].wId) + '/' + toDelete[j].date + '/';
      var files = await sbList(path);
      var paths = files.filter(function(f) { return f.name; }).map(function(f) { return path + f.name; });

      if (paths.length > 0) {
        await sbDelete(paths);
      }
      deleted++;

      // Remove from local state
      var fi = allWorkerFiles[toDelete[j].wId];
      if (fi) {
        fi.dates = fi.dates.filter(function(dd) { return dd !== toDelete[j].date; });
        delete fi.loaded[toDelete[j].date];
      }
    } catch (e) {
      console.warn('Auto-cleanup error:', toDelete[j], e);
    }
  }

  if (deleted > 0) {
    showToast(deleted + ' carpeta(s) antigua(s) eliminada(s) automaticamente', 'info');
    // Re-render without full reload
    if (currentWorkerId) {
      renderDetailView(currentWorkerId);
    } else {
      renderDirectory();
    }
  }
}

// Manual cleanup button (same behavior but with confirmation)

  showProgress('Eliminando archivos antiguos...');
  await autoCleanup();
  hideProgress();
  loadAllData();
}

/* =========================================================
   MIGRATE LEGACY WORKERS TO MEDICINA
   ========================================================= */
async function migrateLegacyToMedicina() {
  // 1. Find legacy workers (in workers/ without servicio)
  var legacyWorkers = allWorkers.filter(function(w) {
    return !w._servicio && !w.servicio;
  });

  if (!legacyWorkers.length) {
    showToast('No hay workers legacy para migrar', 'info');
    return;
  }

  var names = legacyWorkers.map(function(w) { return w.name + ' (' + w._folder + ')'; }).join('\n');
  if (!confirm('Se migraran ' + legacyWorkers.length + ' worker(s) a Medicina:\n\n' + names + '\n\n¿Continuar?')) return;

  showProgress('Migrando workers a Medicina...');
  var migrated = 0;
  var errors = 0;

  for (var wi = 0; wi < legacyWorkers.length; wi++) {
    var w = legacyWorkers[wi];
    var wId = w._folder || w.worker_id;
    var srcPrefix = 'workers/' + wId;
    var dstPrefix = 'medicina/workers/' + wId;

    try {
      // List all files recursively
      var files = await listFilesRecursive(srcPrefix);
      document.getElementById('progressTitle').textContent = 'Migrando ' + w.name + ' (' + files.length + ' archivos)...';

      // Move each file
      for (var fi = 0; fi < files.length; fi++) {
        var srcKey = srcPrefix + '/' + files[fi];
        var dstKey = dstPrefix + '/' + files[fi];

        // Special handling for profile.json: add servicio field
        if (files[fi] === 'profile.json') {
          // Fetch, modify, upload to new location, delete old
          var profRes = await fetch(SB_URL + '/storage/v1/object/' + BUCKET + '/' + srcKey, {
            headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY },
            cache: 'no-store'
          });
          if (profRes.ok) {
            var profile = await profRes.json();
            profile.servicio = 'medicina';
            var blob = new Blob([JSON.stringify(profile, null, 2)], { type: 'application/json' });
            await fetch(SB_URL + '/storage/v1/object/' + BUCKET + '/' + dstKey, {
              method: 'POST',
              headers: { 'Authorization': 'Bearer ' + SB_KEY, 'apikey': SB_KEY, 'Content-Type': 'application/json', 'x-upsert': 'true' },
              body: blob
            });
            // Delete old
            await fetch(SB_URL + '/storage/v1/object/' + BUCKET, {
              method: 'DELETE',
              headers: HEADERS,
              body: JSON.stringify({ prefixes: [srcKey] })
            });
          }
          continue;
        }

        // Move regular file
        var moveRes = await fetch(SB_URL + '/storage/v1/object/move', {
          method: 'POST',
          headers: HEADERS,
          body: JSON.stringify({ bucketId: BUCKET, sourceKey: srcKey, destinationKey: dstKey })
        });
        if (!moveRes.ok) {
          console.warn('Move failed for', srcKey, moveRes.status);
          errors++;
        }
      }
      migrated++;
    } catch (e) {
      console.error('Migration error for', wId, e);
      errors++;
    }
  }

  hideProgress();
  showToast(migrated + ' worker(s) migrado(s) a Medicina' + (errors > 0 ? ' (' + errors + ' errores)' : ''), errors > 0 ? 'warn' : 'success');
  loadAllData();
}

async function listFilesRecursive(prefix) {
  var items = await sbList(prefix + '/');
  var files = [];
  var subfolders = [];
  for (var i = 0; i < items.length; i++) {
    if (items[i].id) {
      files.push(items[i].name);
    } else if (items[i].name) {
      subfolders.push(items[i].name);
    }
  }
  for (var s = 0; s < subfolders.length; s++) {
    var subFiles = await listFilesRecursive(prefix + '/' + subfolders[s]);
    for (var sf = 0; sf < subFiles.length; sf++) {
      files.push(subfolders[s] + '/' + subFiles[sf]);
    }
  }
  return files;
}

function openLbReg(regId, startIndex) {

  showLightbox();

function openLightboxSingle(url, caption) {
  lightboxImages = [{ url: url, caption: caption || '', path: '' }];

}

function showLightbox() {
  var lb = document.getElementById('lightbox');

  document.getElementById('lbPrev').style.display = lightboxImages.length > 1 ? 'flex' : 'none';
  document.getElementById('lbNext').style.display = lightboxImages.length > 1 ? 'flex' : 'none';

  // Preload all images with CORS for instant navigation + editing
  for (var i = 0; i < lightboxImages.length; i++) {
    var pre = new Image();
    pre.crossOrigin = 'anonymous';
    pre.src = lightboxImages[i].url;
  }

  updateLightboxUI();
  lb.classList.add('on');
  document.body.style.overflow = 'hidden';
}

function updateLightboxUI() {
  var current = lightboxImages[lightboxIndex];
  document.getElementById('lbImg').src = current.url;
  document.getElementById('lbCaption').textContent = current.caption || '';

  // Counter
  var counter = document.getElementById('lbCounter');
  counter.textContent = lightboxImages.length > 1 ? (lightboxIndex + 1) + ' / ' + lightboxImages.length : '';
  counter.style.display = lightboxImages.length > 1 ? '' : 'none';

  document.getElementById('lbEditBtn').style.display = 'inline-flex';
  document.getElementById('lbDelBtn').style.display = 'inline-flex';
}

function getLbPath(current) {
  if (current.path) return current.path;
  // Extract path from public URL
  var marker = '/storage/v1/object/public/' + BUCKET + '/';
  var idx = current.url.indexOf(marker);
  if (idx >= 0) return current.url.substring(idx + marker.length);
  return '';
}

function closeLightbox(e) {
  if (e && e.target && (e.target.tagName === 'IMG' || e.target.tagName === 'BUTTON')) return;
  document.getElementById('lightbox').classList.remove('on');
  document.body.style.overflow = '';
}

function navLightbox(dir) {
  lightboxIndex += dir;
  if (lightboxIndex < 0) lightboxIndex = lightboxImages.length - 1;
  if (lightboxIndex >= lightboxImages.length) lightboxIndex = 0;
  updateLightboxUI();
}

function editFromLightbox() {
  var current = lightboxImages[lightboxIndex];
  if (!current) return;
  var path = getLbPath(current);
  if (!path) { showToast('No se puede editar este archivo', 'error'); return; }
  closeLightbox();
  openPcEditor(current.url, path, current.caption || 'Imagen');
}

function downloadFromLightbox() {
  var current = lightboxImages[lightboxIndex];
  if (!current) return;
  var filename = (current.caption || 'imagen').replace(/[^a-zA-Z0-9_\- ]/g, '') + '.jpg';
  var path = getLbPath(current);

  // If we have an edited version in memory, download that directly
  if (path && editedImages[path]) {
    var dataUrl = editedImages[path];
    var bin = atob(dataUrl.split(',')[1]);
    var arr = new Uint8Array(bin.length);
    for (var i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
    var blob = new Blob([arr], { type: 'image/jpeg' });
    var blobUrl = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = blobUrl;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function() { URL.revokeObjectURL(blobUrl); }, 2000);
    showToast('Descargado: ' + filename, 'success');
    return;
  }

  // Otherwise download from server (authenticated, no cache)
  if (path) {
    showToast('Descargando: ' + filename, 'info');
    fetch(SB_URL + '/storage/v1/object/' + BUCKET + '/' + path, {
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY },
      cache: 'no-store'
    }).then(function(res) {
      if (!res.ok) throw new Error('Error ' + res.status);
      return res.blob();
    }).then(function(blob) {
      var blobUrl = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = blobUrl;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(function() { URL.revokeObjectURL(blobUrl); }, 2000);
      showToast('Descargado: ' + filename, 'success');
    }).catch(function(e) {
      console.error('Auth download failed, fallback:', e);
      forceDl(current.url, filename);
    });
  } else {
    forceDl(current.url, filename);
  }
}

function deleteFromLightbox() {
  var current = lightboxImages[lightboxIndex];
  if (!current) return;
  var path = getLbPath(current);
  if (!path) { showToast('No se puede eliminar este archivo', 'error'); return; }
  if (!confirm('¿Eliminar esta imagen?\n\nEsta accion no se puede deshacer.')) return;

  closeLightbox();

   PC PHOTO EDITOR
   ========================================================= */
function openPcEditor(url, storagePath, docName) {

  pceEdited = false;

  document.getElementById('pceCrop').style.display = 'none';

  var img = document.getElementById('pceImg');
  img.crossOrigin = 'anonymous';

function closePcEditor() {
  document.getElementById('pcEditor').classList.remove('on');
  document.body.style.overflow = '';
  pceCropping = false;
  document.getElementById('pceCrop').style.display = 'none';
}

function getImgBounds() {
  var img = document.getElementById('pceImg');
  var wrap = document.getElementById('pceWrap');
  var ir = img.getBoundingClientRect();
  var wr = wrap.getBoundingClientRect();
  return { l: ir.left - wr.left, t: ir.top - wr.top, w: ir.width, h: ir.height };
}

function togglePcCrop() {
  pceCropping = !pceCropping;
  var cropEl = document.getElementById('pceCrop');
  if (pceCropping) {
    var b = getImgBounds();
    var m = 30;
    cropEl.style.left = (b.l + m) + 'px';
    cropEl.style.top = (b.t + m) + 'px';
    cropEl.style.width = (b.w - m * 2) + 'px';
    cropEl.style.height = (b.h - m * 2) + 'px';
    cropEl.style.display = 'block';
  } else {
    cropEl.style.display = 'none';
  }
}

function applyCropPc() {
  if (!pceCropping) { showToast('Activa el recorte primero', 'info'); return; }
  try {
    var img = document.getElementById('pceImg');
    var cropEl = document.getElementById('pceCrop');
    var ir = img.getBoundingClientRect();
    var cr = cropEl.getBoundingClientRect();

    // Offset by border width (3px) so crop matches what's inside the border lines
    var bw = 3;
    var scaleX = img.naturalWidth / ir.width;
    var scaleY = img.naturalHeight / ir.height;
    var sx = Math.max(0, (cr.left + bw) - ir.left) * scaleX;
    var sy = Math.max(0, (cr.top + bw) - ir.top) * scaleY;
    var sw = (cr.width - bw * 2) * scaleX;
    var sh = (cr.height - bw * 2) * scaleY;

    sw = Math.min(sw, img.naturalWidth - sx);
    sh = Math.min(sh, img.naturalHeight - sy);

    var c = document.createElement('canvas');
    c.width = Math.round(sw); c.height = Math.round(sh);
    c.getContext('2d').drawImage(img, Math.round(sx), Math.round(sy), Math.round(sw), Math.round(sh), 0, 0, c.width, c.height);

    pceEditedDataUrl = c.toDataURL('image/jpeg', 0.92);
    pceEdited = true;
    img.src = pceEditedDataUrl;
    pceCropping = false;
    cropEl.style.display = 'none';
    showToast('Recorte listo. Pulsa Guardar.', 'success');
  } catch (e) {
    showToast('Error al recortar: ' + e.message, 'error');
  }
}

function savePcEdit() {
  if (!pceEdited || !pceEditedDataUrl) { showToast('No hay cambios', 'info'); return; }

  var bin = atob(pceEditedDataUrl.split(',')[1]);
  var arr = new Uint8Array(bin.length);
  for (var i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  var blob = new Blob([arr], { type: 'image/jpeg' });

  var saveBtn = document.querySelector('#pcEditor .pce-btn.save');
  if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = 'Guardando...'; }

  // Clean path: remove any query params that might have leaked in
  var cleanPath = pcePath.split('?')[0];
  console.log('Saving to:', cleanPath, 'blob size:', blob.size, 'bytes');

  fetch(SB_URL + '/storage/v1/object/' + BUCKET + '/' + cleanPath, {
    method: 'POST',
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'image/jpeg', 'x-upsert': 'true' },
    body: blob
  }).then(function(res) {
    if (!res.ok) return res.text().then(function(t) { throw new Error(res.status + ': ' + t); });
    return res.text().then(function(body) { console.log('Upload OK:', cleanPath, body); });
  }).then(function() {
    showToast('Imagen guardada correctamente', 'success');
    // Store edited image in memory so downloads use it directly
    editedImages[cleanPath] = pceEditedDataUrl;
    pceEdited = false;
    closePcEditor();
    imgCacheBuster = Date.now();
    softReloadDate(cleanPath);
  }).catch(function(e) {
    showToast('Error al guardar: ' + e.message, 'error');
    console.error('Save error:', e);
  }).finally(function() {
    if (saveBtn) { saveBtn.disabled = false; saveBtn.innerHTML = '&#10003; Guardar'; }
  });
}

function deletePcImage() {
  if (!confirm('¿Eliminar esta imagen?\n\nNo se puede deshacer.')) return;
  closePcEditor();
  doDeletePcFile(pcePath);
}

function deletePcFile(storagePath) {
  if (!confirm('¿Eliminar este archivo?\n\nNo se puede deshacer.')) return;
  doDeletePcFile(storagePath);
}

function doDeletePcFile(storagePath) {
  showToast('Eliminando...', 'info');
  sbDelete([storagePath]).then(function(res) {
    if (!res.ok) throw new Error('Error ' + res.status);
    showToast('Archivo eliminado', 'success');
    softReloadDate(storagePath);
  }).catch(function(e) {
    showToast('Error al eliminar: ' + e.message, 'error');
  });
}

function softReloadDate(path) {
  var parts = path.split('?')[0].split('/');
  if (parts.length >= 3 && parts[0] === 'workers') {
    var wId = parts[1];
    var date = parts[2];
    var fi = allWorkerFiles[wId];
    if (fi && fi.loaded[date]) {
      delete fi.loaded[date];
      // Re-fetch just this date's files and re-render
      loadDateFiles(wId, date);
    }
  }
}

/* PC Editor crop drag */
(function() {
  var dragType = '', handle = '', sx, sy, sl, st, sw, sh;

  document.addEventListener('mousedown', function(e) {
    var crop = document.getElementById('pceCrop');
    if (!crop || crop.style.display === 'none') return;
    if (!crop.contains(e.target)) return;

    if (e.target.classList.contains('ch')) {
      dragType = 'resize';
      handle = e.target.getAttribute('data-h');
    } else {
      dragType = 'move';
    }
    sx = e.clientX; sy = e.clientY;
    sl = crop.offsetLeft; st = crop.offsetTop;
    sw = crop.offsetWidth; sh = crop.offsetHeight;
    e.preventDefault();
  });

  document.addEventListener('mousemove', function(e) {
    if (!dragType) return;
    var crop = document.getElementById('pceCrop');
    var b = getImgBounds();
    var dx = e.clientX - sx, dy = e.clientY - sy;

    if (dragType === 'move') {
      crop.style.left = Math.max(b.l, Math.min(sl + dx, b.l + b.w - crop.offsetWidth)) + 'px';
      crop.style.top = Math.max(b.t, Math.min(st + dy, b.t + b.h - crop.offsetHeight)) + 'px';
    } else {
      var nl, nt, nw, nh;
      if (handle === 'br') {
        nw = Math.max(30, Math.min(sw + dx, b.l + b.w - sl));
        nh = Math.max(30, Math.min(sh + dy, b.t + b.h - st));
        crop.style.width = nw + 'px'; crop.style.height = nh + 'px';
      } else if (handle === 'tl') {
        nw = Math.max(30, sw - dx); nh = Math.max(30, sh - dy);
        nl = sl + sw - nw; nt = st + sh - nh;
        if (nl >= b.l) { crop.style.left = nl + 'px'; crop.style.width = nw + 'px'; }
        if (nt >= b.t) { crop.style.top = nt + 'px'; crop.style.height = nh + 'px'; }
      } else if (handle === 'tr') {
        nw = Math.max(30, Math.min(sw + dx, b.l + b.w - sl));
        nh = Math.max(30, sh - dy); nt = st + sh - nh;
        crop.style.width = nw + 'px';
        if (nt >= b.t) { crop.style.top = nt + 'px'; crop.style.height = nh + 'px'; }
      } else if (handle === 'bl') {
        nw = Math.max(30, sw - dx); nl = sl + sw - nw;
        nh = Math.max(30, Math.min(sh + dy, b.t + b.h - st));
        if (nl >= b.l) { crop.style.left = nl + 'px'; crop.style.width = nw + 'px'; }
        crop.style.height = nh + 'px';
      }
    }
  });

  document.addEventListener('mouseup', function() { dragType = ''; });
})();

startAutoRefresh();
