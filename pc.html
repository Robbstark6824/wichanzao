<!DOCTYPE html>
<html lang="es">

<script>
// Nuclear SW reset: runs BEFORE anything else to ensure latest code
(function(){
  if (!navigator.serviceWorker) return;
  navigator.serviceWorker.getRegistration().then(function(reg) {
    if (!reg) return;
    reg.update();
  });
})();
</script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>

<script defer src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root {
  --n1:#0C1F3D; --n2:#142952; --n3:#1B3A6B;
  --tl:#4ECDC4; --tl2:#3BB8B0;
  --gd:#D4A853; --gd2:#C4983F;
  --bg:#F5F7FA; --s1:#FFF; --s2:#EEF1F6;
  --t1:#0D1B2A; --t2:#4A5568; --t3:#A0AEC0;
  --bd:#D8DFE9;
  --danger:#E53E3E; --success:#38A169; --warn:#D69E2E;
  --r1:16px; --r2:12px; --r3:8px;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body { font-family:'Manrope',sans-serif; background:var(--bg); color:var(--t1); min-height:100vh; }

/* ===== HEADER ===== */
.header {
  background:linear-gradient(135deg,#080E1A 0%,var(--n1) 30%,var(--n2) 70%,var(--n3) 100%);
  color:#fff; padding:0; position:sticky; top:0; z-index:100;
  box-shadow:0 4px 32px rgba(0,0,0,.3),0 1px 4px rgba(0,0,0,.15);
  border-bottom:1px solid rgba(78,205,196,.08);
}
.header-inner {
  max-width:1400px; margin:0 auto; padding:26px 32px;
  display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:16px;
  position:relative;
}
.header-inner::before {
  content:''; position:absolute; top:-60%; left:-10%; width:400px; height:400px;
  background:radial-gradient(circle,rgba(212,168,83,.04) 0%,transparent 70%);
  border-radius:50%; pointer-events:none;
}
.header-inner::after {
  content:''; position:absolute; inset:0;
  background:radial-gradient(circle at 90% 20%,rgba(78,205,196,.1),transparent 50%);
  pointer-events:none;
}
.header-left { position:relative; z-index:1; }
.header-left h1 {
  font-family:'Playfair Display',serif; font-size:22px; font-weight:900;
  display:flex; align-items:center; gap:10px; line-height:1.2;
}
.header-left h1 svg { width:30px; height:30px; flex-shrink:0; }
.header-left .subtitle { font-size:12px; opacity:.45; margin-top:6px; font-weight:500; letter-spacing:.3px; }
.header-right { display:flex; align-items:center; gap:16px; position:relative; z-index:1; }
.header-status {
  display:flex; align-items:center; gap:8px;
  background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.08);
  border-radius:10px; backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
  padding:9px 16px; font-size:11px; font-weight:600;
}
.status-dot {
  width:8px; height:8px; border-radius:50%; background:var(--success);
  animation:pulse 2s infinite; box-shadow:0 0 6px rgba(56,161,105,.4);
}
.status-dot.paused { background:var(--warn); animation:none; box-shadow:0 0 6px rgba(214,158,46,.4); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
.refresh-countdown { font-variant-numeric:tabular-nums; min-width:24px; text-align:center; }

/* ===== MAIN LAYOUT ===== */
.main { max-width:1400px; margin:0 auto; padding:24px 24px 60px; }

/* ===== TOOLBAR ===== */
.toolbar {
  display:flex; gap:12px; margin-bottom:24px; flex-wrap:wrap; align-items:center;
}
.search-wrap { flex:1; min-width:260px; position:relative; }
.search-wrap input {
  width:100%; padding:13px 16px 13px 44px;
  border-radius:14px; border:2px solid var(--bd);
  font-size:14px; font-family:inherit; font-weight:500;
  color:var(--t1); outline:none; background:var(--s1);
  transition:border-color .2s, box-shadow .2s;
  box-shadow:0 2px 8px rgba(0,0,0,.03);
}
.search-wrap input:focus { border-color:var(--tl); box-shadow:0 0 0 4px rgba(78,205,196,.1),0 2px 8px rgba(0,0,0,.03); }
.search-wrap input::placeholder { color:var(--t3); }
.search-wrap .search-icon {
  position:absolute; left:15px; top:50%; transform:translateY(-50%);
  color:var(--t3); pointer-events:none; display:flex;
}
.search-wrap .search-hint {
  position:absolute; right:12px; top:50%; transform:translateY(-50%);
  font-size:10px; color:var(--t3); background:var(--s2);
  padding:3px 8px; border-radius:6px; font-weight:600;
  pointer-events:none; letter-spacing:.3px;
}
.toolbar select {
  padding:12px 14px; border-radius:14px; border:2px solid var(--bd);
  font-size:13px; font-weight:600; font-family:inherit;
  background:var(--s1); color:var(--t1); cursor:pointer; outline:none;
  transition:border-color .2s; box-shadow:0 2px 8px rgba(0,0,0,.03);
}
.toolbar select:focus { border-color:var(--tl); }
.tb-btn {
  padding:12px 22px; border-radius:14px; border:2px solid var(--bd);
  background:var(--s1); color:var(--t1); font-size:12px; font-weight:700;
  font-family:inherit; cursor:pointer;
  display:inline-flex; align-items:center; gap:6px;
  transition:all .2s; white-space:nowrap;
  box-shadow:0 2px 8px rgba(0,0,0,.03);
}
.tb-btn:hover { border-color:var(--tl); background:rgba(78,205,196,.06); }
.tb-btn:active { transform:scale(.97); }
.tb-btn.primary { background:linear-gradient(135deg,var(--n1),var(--n2)); color:#fff; border-color:transparent; box-shadow:0 4px 14px rgba(12,31,61,.25); }
.tb-btn.primary:hover { box-shadow:0 6px 20px rgba(12,31,61,.3); }
.tb-btn.danger { color:var(--danger); border-color:rgba(229,62,62,.3); }
.tb-btn.danger:hover { background:rgba(229,62,62,.06); border-color:var(--danger); }

/* ===== VIEW MODES ===== */
.view-directory { display:block; }
.view-detail { display:none; }
.view-directory.hidden { display:none; }
.view-detail.visible { display:block; }

/* ===== WORKER GRID ===== */
.workers-grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px;
  contain:layout style;
}
@media(max-width:1024px) { .workers-grid { grid-template-columns:repeat(2,1fr); } }
@media(max-width:600px) { .workers-grid { grid-template-columns:1fr; } }

/* Service Hub */
.service-hub { text-align:center; padding:28px 0 16px; }
.service-hub h2 { font-family:'Playfair Display',serif; font-size:26px; font-weight:900; color:var(--n1); margin-bottom:6px; }
.service-hub p { font-size:13px; color:var(--t3); margin-bottom:28px; }
.service-grid {
  display:grid; grid-template-columns:repeat(4,1fr); gap:18px;
  max-width:940px; margin:0 auto;
}
@media(max-width:900px) { .service-grid { grid-template-columns:repeat(3,1fr); } }
@media(max-width:600px) { .service-grid { grid-template-columns:repeat(2,1fr); } }
.service-card {
  background:var(--s1); border-radius:20px; padding:30px 16px 24px;
  border:1px solid var(--bd); cursor:pointer; text-align:center;
  transition:transform .3s cubic-bezier(.4,0,.2,1),box-shadow .3s cubic-bezier(.4,0,.2,1),border-color .3s; position:relative; overflow:hidden;
  box-shadow:0 2px 8px rgba(0,0,0,.04); will-change:transform;
}
.service-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:3px;
  background:linear-gradient(90deg,var(--tl),var(--gd)); opacity:0;
  transition:opacity .3s; pointer-events:none;
}
.service-card::after {
  content:''; position:absolute; inset:0;
  background:linear-gradient(160deg,transparent 40%,rgba(78,205,196,.03));
  pointer-events:none;
}
.service-card:hover {
  transform:translateY(-6px);
  box-shadow:0 20px 48px rgba(0,0,0,.1),0 4px 12px rgba(0,0,0,.04);
  border-color:var(--tl);
}
.service-card:hover::before { opacity:1; }
.service-card:active { transform:translateY(-2px); }
.service-icon {
  width:58px; height:58px; border-radius:18px;
  display:flex; align-items:center; justify-content:center;
  margin:0 auto 14px; font-size:26px;
  position:relative; z-index:1;
}
.service-card:hover .service-icon { transform:scale(1.08); transition:transform .3s; }
.service-name { font-weight:800; font-size:14px; color:var(--t1); margin-bottom:4px; }
.service-count { font-size:11px; color:var(--t3); font-weight:600; }

.worker-card {
  background:var(--s1); border-radius:18px; padding:20px;
  border:1px solid var(--bd); cursor:pointer;
  transition:transform .25s cubic-bezier(.4,0,.2,1),box-shadow .25s cubic-bezier(.4,0,.2,1),border-color .25s;
  display:flex; align-items:center; gap:14px;
  position:relative; overflow:hidden;
  box-shadow:0 2px 8px rgba(0,0,0,.03); will-change:transform;
}
.worker-card::before {
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg,transparent 60%,rgba(78,205,196,.03));
  pointer-events:none;
}
.worker-card:hover {
  transform:translateY(-4px);
  box-shadow:0 16px 40px rgba(0,0,0,.1),0 4px 12px rgba(0,0,0,.04);
  border-color:var(--tl);
}
.worker-card:active { transform:translateY(-1px); }

/* Avatar */
.avatar {
  display:flex; align-items:center; justify-content:center;
  border-radius:50%; font-weight:800; color:#fff; flex-shrink:0;
  position:relative; box-shadow:0 4px 12px rgba(0,0,0,.12);
}
.avatar.sm { width:36px; height:36px; font-size:12px; }
.avatar.md { width:48px; height:48px; font-size:16px; }
.avatar.lg { width:64px; height:64px; font-size:22px; }
.avatar.xl { width:80px; height:80px; font-size:28px; }
.activity-dot {
  position:absolute; bottom:1px; right:1px;
  width:12px; height:12px; border-radius:50%;
  border:2.5px solid var(--s1);
}
.activity-dot.green { background:var(--success); box-shadow:0 0 6px rgba(56,161,105,.4); }
.activity-dot.yellow { background:var(--warn); box-shadow:0 0 6px rgba(214,158,46,.4); }
.activity-dot.gray { background:var(--t3); }

.worker-info { flex:1; min-width:0; }
.worker-name {
  font-size:15px; font-weight:800;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.worker-area {
  display:inline-block; margin-top:4px;
  padding:3px 10px; border-radius:6px;
  font-size:10px; font-weight:700; text-transform:uppercase;
  letter-spacing:.5px;
  background:rgba(78,205,196,.1); color:var(--tl2);
}
.worker-time { font-size:11px; color:var(--t3); margin-top:4px; font-weight:500; }
.worker-arrow { color:var(--t3); font-size:14px; flex-shrink:0; transition:transform .2s; }
.worker-card:hover .worker-arrow { transform:translateX(3px); color:var(--tl); }

/* ===== SKELETON ===== */
.skeleton { animation:shimmer 1.5s infinite; border-radius:var(--r2); }
@keyframes shimmer {
  0% { background-position:-200% 0; }
  100% { background-position:200% 0; }
}
.skel-card {
  background:var(--s1); border-radius:var(--r1); padding:20px;
  border:1px solid var(--bd); display:flex; align-items:center; gap:14px;
}
.skel-circle {
  width:48px; height:48px; border-radius:50%; flex-shrink:0;
  background:linear-gradient(90deg,var(--s2) 25%,#e8ebf0 50%,var(--s2) 75%);
  background-size:200% 100%; animation:shimmer 1.5s infinite;
}
.skel-lines { flex:1; }
.skel-line {
  height:12px; border-radius:6px; margin-bottom:8px;
  background:linear-gradient(90deg,var(--s2) 25%,#e8ebf0 50%,var(--s2) 75%);
  background-size:200% 100%; animation:shimmer 1.5s infinite;
}
.skel-line:last-child { margin-bottom:0; width:60%; }
.skel-line.short { width:40%; }

/* ===== DETAIL VIEW ===== */
.detail-header {
  background:var(--s1); border-radius:20px; padding:24px;
  border:1px solid var(--bd); margin-bottom:20px;
  display:flex; align-items:center; gap:20px; flex-wrap:wrap;
  box-shadow:0 2px 12px rgba(0,0,0,.04);
  position:relative; overflow:hidden;
}
.detail-header::before {
  content:''; position:absolute; top:0; left:0; right:0; height:3px;
  background:linear-gradient(90deg,var(--tl),var(--tl2),var(--gd));
}
.detail-back {
  width:42px; height:42px; border-radius:12px;
  background:var(--s2); border:none; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  font-size:18px; color:var(--t1); transition:all .2s;
}
.detail-back:hover { background:var(--tl); color:var(--n1); }
.detail-info { flex:1; min-width:0; }
.detail-name {
  font-family:'Playfair Display',serif;
  font-size:22px; font-weight:800;
}
.detail-area-row { display:flex; align-items:center; gap:8px; margin-top:4px; flex-wrap:wrap; }
.detail-area {
  display:inline-block; padding:4px 12px; border-radius:6px;
  font-size:11px; font-weight:700; text-transform:uppercase;
  background:rgba(78,205,196,.1); color:var(--tl2);
}
.detail-activity { font-size:12px; color:var(--t3); }
.detail-actions { display:flex; gap:8px; flex-wrap:wrap; }

/* Month group */
.month-group { margin-bottom:20px; content-visibility:auto; contain-intrinsic-size:auto 200px; }
.month-header {
  display:flex; align-items:center; gap:10px; margin-bottom:10px;
  padding:0 4px; cursor:pointer; user-select:none;
}
.month-header h2 {
  font-family:'Playfair Display',serif; font-size:18px; font-weight:800;
  color:var(--n1); flex:1;
}
.month-header .month-count {
  font-size:11px; color:var(--t3); font-weight:600;
  background:var(--s2); padding:3px 10px; border-radius:12px;
}
.month-header .month-arrow {
  font-size:10px; color:var(--t3); transition:transform .25s cubic-bezier(.4,0,.2,1);
}
.month-header .month-arrow.open { transform:rotate(90deg); }
.month-body { display:none; }
.month-body.open { display:block; }

/* Date section */
.date-section {
  background:var(--s1); border-radius:16px;
  border:1px solid var(--bd); margin-bottom:12px;
  overflow:hidden; transition:all .25s;
  box-shadow:0 1px 4px rgba(0,0,0,.03);
}
.date-section:hover { box-shadow:0 4px 20px rgba(0,0,0,.06); }
.date-header {
  padding:16px 20px; display:flex; align-items:center; gap:12px;
  cursor:pointer; user-select:none; transition:background .15s;
  border-bottom:1px solid transparent;
}
.date-header:hover { background:#FAFBFC; }
.date-header.open { border-bottom-color:var(--bd); background:#FAFBFC; }
.date-arrow {
  font-size:10px; color:var(--t3); transition:transform .25s cubic-bezier(.4,0,.2,1);
  flex-shrink:0;
}
.date-arrow.open { transform:rotate(90deg); }
.date-title { flex:1; }
.date-title h3 { font-size:14px; font-weight:700; display:flex; align-items:center; gap:8px; }
.date-title .today-badge {
  padding:3px 10px; border-radius:6px; font-size:9px; font-weight:700;
  background:linear-gradient(135deg,var(--tl),var(--tl2)); color:var(--n1); text-transform:uppercase;
  letter-spacing:.5px; box-shadow:0 2px 8px rgba(78,205,196,.25);
}
.date-title .count {
  font-size:11px; color:var(--t3); font-weight:500; margin-top:2px;
}
.date-actions { display:flex; gap:6px; }
.date-btn {
  padding:7px 14px; border-radius:var(--r3); border:1.5px solid var(--bd);
  background:var(--s1); color:var(--t1); font-size:11px; font-weight:600;
  font-family:inherit; cursor:pointer;
  display:inline-flex; align-items:center; gap:4px;
  transition:all .15s;
}
.date-btn:hover { border-color:var(--tl); background:rgba(78,205,196,.06); }
.date-btn:active { transform:scale(.95); }

.date-body { display:none; padding:0; }
.date-body.open { display:block; }

/* File card */
.file-card {
  padding:18px 22px; border-bottom:1px solid #F0F2F5;
  display:flex; align-items:flex-start; gap:16px;
  transition:background .15s;
}
.file-card:last-child { border-bottom:none; }
.file-card:hover { background:rgba(78,205,196,.02); }
.file-thumb {
  width:64px; height:80px; border-radius:10px;
  object-fit:cover; border:1px solid var(--bd);
  cursor:pointer; flex-shrink:0;
  transition:transform .25s cubic-bezier(.4,0,.2,1), box-shadow .25s;
  background:var(--s2);
}
.file-thumb:hover { transform:scale(1.08); box-shadow:0 8px 24px rgba(0,0,0,.12); }
.file-content { flex:1; min-width:0; }
.file-head { display:flex; align-items:center; gap:8px; margin-bottom:4px; }
.file-icon { font-size:18px; }
.file-name {
  font-size:14px; font-weight:700;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.file-type-badge {
  padding:3px 10px; border-radius:6px; font-size:9px; font-weight:800;
  text-transform:uppercase; letter-spacing:.5px; flex-shrink:0;
}
.badge-foto { background:linear-gradient(135deg,#DCFCE7,#D1FAE5); color:#15803D; }
.badge-pdf { background:linear-gradient(135deg,#FEE2E2,#FECACA); color:#B91C1C; }
.file-meta { font-size:11px; color:var(--t3); margin-bottom:8px; }
.file-actions { display:flex; gap:6px; flex-wrap:wrap; }
.dl-btn {
  padding:8px 16px; border-radius:10px; border:none;
  font-size:11px; font-weight:700; font-family:inherit;
  cursor:pointer; display:inline-flex; align-items:center; gap:5px;
  transition:all .2s;
}
.dl-btn:hover { opacity:.88; transform:translateY(-1px); }
.dl-btn:active { transform:scale(.95) translateY(0); }
.dl-btn.primary { background:linear-gradient(135deg,var(--n1),var(--n2)); color:#fff; box-shadow:0 2px 8px rgba(12,31,61,.2); }
.dl-btn.secondary { background:var(--s2); color:var(--t1); }
.dl-btn.pdf { background:linear-gradient(135deg,var(--danger),#C53030); color:#fff; box-shadow:0 2px 8px rgba(229,62,62,.2); }
.dl-btn.gold { background:linear-gradient(135deg,var(--gd),var(--gd2)); color:var(--n1); box-shadow:0 2px 8px rgba(212,168,83,.2); }
.dl-btn:disabled { opacity:.5; cursor:not-allowed; transform:none; box-shadow:none; }


/* ===== LEGACY SECTION ===== */
.legacy-section { margin-top:32px; }
.legacy-title {
  font-family:'Playfair Display',serif; font-size:18px; font-weight:800;
  margin-bottom:14px; display:flex; align-items:center; gap:8px;
  color:var(--t2);
}
.legacy-title .badge {
  padding:3px 8px; border-radius:4px; font-family:'Manrope',sans-serif;
  font-size:10px; font-weight:700; background:rgba(212,168,83,.15);
  color:var(--gd2); text-transform:uppercase;
}

/* ===== EMPTY STATE ===== */
.empty-state { text-align:center; padding:80px 20px; color:var(--t3); }
.empty-state .icon { font-size:56px; margin-bottom:16px; opacity:.8; }
.empty-state h3 { font-size:18px; color:var(--t2); margin-bottom:6px; font-weight:800; }
.empty-state p { font-size:13px; line-height:1.6; max-width:320px; margin:0 auto; }

/* ===== LIGHTBOX ===== */
#lightbox {
  position:fixed; inset:0; background:rgba(0,0,0,.94);
  z-index:500; display:none; align-items:center; justify-content:center;
  flex-direction:column; cursor:pointer;
}
#lightbox.on { display:flex; }
#lightbox img {
  max-width:92vw; max-height:82vh; border-radius:8px;
  object-fit:contain; cursor:default;
  animation:lbIn .2s ease;
}
@keyframes lbIn { from{opacity:0;transform:scale(.95)} to{opacity:1;transform:scale(1)} }
.lb-close {
  position:absolute; top:16px; right:16px;
  width:44px; height:44px; background:rgba(255,255,255,.1);
  backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.1);
  border-radius:50%; color:#fff; font-size:22px;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  font-weight:800; transition:all .2s;
}
.lb-close:hover { background:rgba(255,255,255,.2); transform:scale(1.05); }
.lb-caption {
  color:#fff; text-align:center; margin-top:12px;
  font-size:13px; opacity:.6; max-width:80vw;
}
.lb-bottom {
  position:absolute; bottom:24px; left:50%; transform:translateX(-50%);
  display:flex; align-items:center; gap:10px;
  background:rgba(12,31,61,.85); backdrop-filter:blur(12px);
  border-radius:var(--r1); padding:12px 20px;
  box-shadow:0 8px 32px rgba(0,0,0,.4);
}
.lb-counter {
  color:#fff; font-size:14px; font-weight:700; min-width:50px; text-align:center;

  return Array.isArray(data) ? data : [];
}

    });

/* =========================================================
   FILE GROUPING
   ========================================================= */
function groupFiles(rawFiles, pathPrefix) {
  var groups = {};
  for (var i = 0; i < rawFiles.length; i++) {
    var f = rawFiles[i];
    if (!f.id || !f.name) continue;
    if (f.name === 'profile.json') continue;
    if (f.name.match(/_thumb\.(jpg|jpeg|png)$/i)) continue;

    // Real PDF file
    if (f.name.match(/\.pdf$/i)) {
      var pdfClean = f.name.replace(/^\d+_/, '').replace(/\.pdf$/i, '');
      var pdfKey = '_pdf_' + pdfClean;
      if (!groups[pdfKey]) {
        groups[pdfKey] = { name: pdfClean, type: 'pdf-file', pdfUrl: pubUrl(pathPrefix + '/' + f.name), pages: [], totalSize: 0, rawName: f.name };
      }
      groups[pdfKey].pdfUrl = pubUrl(pathPrefix + '/' + f.name);
      groups[pdfKey].totalSize += (f.metadata && f.metadata.size) || 0;
      continue;
    }

    var clean = f.name.replace(/^\d+_/, '');
    var m = clean.match(/^(.+)_pag(\d+)\.(jpg|jpeg|png)$/i);
    if (m) {
      var base = m[1];
      if (!groups[base]) groups[base] = { name: base, type: 'pdf', pages: [], totalSize: 0 };
      groups[base].pages.push({ file: f, num: parseInt(m[2]), url: pubUrl(pathPrefix + '/' + f.name), rawName: f.name });
      groups[base].totalSize += (f.metadata && f.metadata.size) || 0;
    } else {
      var dname = clean.replace(/\.(jpg|jpeg|png)$/i, '');
      var key = '_s_' + f.name;
      groups[key] = {
        name: dname, type: 'foto',
        pages: [{ file: f, num: 1, url: pubUrl(pathPrefix + '/' + f.name), rawName: f.name }],
        totalSize: (f.metadata && f.metadata.size) || 0
      };
    }
  }

  // Link PDF files with their multi-page image groups
  var keys = Object.keys(groups);
  for (var k = 0; k < keys.length; k++) {
    var g = groups[keys[k]];
    if (g.type === 'pdf') {
      var pdfKey2 = '_pdf_' + g.name;
      if (groups[pdfKey2]) {
        g.pdfUrl = groups[pdfKey2].pdfUrl;
        g.totalSize += groups[pdfKey2].totalSize;
        delete groups[pdfKey2];
      }
    }
  }

  var result = [];
  keys = Object.keys(groups);
  for (var j = 0; j < keys.length; j++) {
    var gr = groups[keys[j]];
    gr.pages.sort(function(a, b) { return a.num - b.num; });
    result.push(gr);
  }
  return result;
}

    // 2. Build search prefixes: each servicio + legacy workers/
    var searchPrefixes = [];
    for (var sk = 0; sk < SERVICIOS_KEYS.length; sk++) {
      var sKey = SERVICIOS_KEYS[sk];
      if (rootFolders.some(function(f) { return f.name === sKey; })) {
        searchPrefixes.push({ servicio: sKey, prefix: sKey + '/workers/' });
      }
    }
    if (rootFolders.some(function(f) { return f.name === 'workers'; })) {
      searchPrefixes.push({ servicio: '', prefix: 'workers/' });
    }

    var legacyNames = rootFolders.filter(function(f) {
      return f.name !== 'workers' && f.name !== '.emptyFolderPlaceholder' && !SERVICIOS[f.name];
    }).map(function(f) { return f.name; });

    // 3. Load workers from all servicios in parallel
    var workers = [];
    allWorkerPaths = {};

    var prefixResults = await Promise.all(searchPrefixes.map(function(sp) {
      return sbList(sp.prefix).then(function(items) {
        return { servicio: sp.servicio, prefix: sp.prefix, folders: items.filter(function(i) { return i.id === null && i.name; }) };
      }).catch(function() { return { servicio: sp.servicio, prefix: sp.prefix, folders: [] }; });
    }));

    // Collect all folder entries with their base paths
    var allEntries = [];
    for (var pr = 0; pr < prefixResults.length; pr++) {
      var pRes = prefixResults[pr];
      for (var fi = 0; fi < pRes.folders.length; fi++) {
        allEntries.push({
          name: pRes.folders[fi].name,
          basePath: pRes.prefix + pRes.folders[fi].name,
          servicio: pRes.servicio
        });
      }
    }

    // Fetch all profiles AND date folders in parallel (2 requests per worker at once)
    var profilePromises = allEntries.map(function(entry) {
      return fetch(SB_URL + '/storage/v1/object/' + BUCKET + '/' + entry.basePath + '/profile.json', {
        headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
      }).then(function(r) { return r.ok ? r.json() : null; })
        .catch(function() { return null; });
    });
    var dateListPromises = allEntries.map(function(entry) {
      return sbList(entry.basePath + '/').catch(function() { return []; });
    });

    // Fire both sets at the same time — profiles + dates load simultaneously
    var combined = await Promise.all([Promise.all(profilePromises), Promise.all(dateListPromises)]);
    var profiles = combined[0];
    var dateResults = combined[1];

    for (var i = 0; i < allEntries.length; i++) {
      var p = profiles[i];
      if (!p) {
        p = { name: allEntries[i].name, area: '' };
      }
      p._folder = allEntries[i].name;
      p._basePath = allEntries[i].basePath;
      p._servicio = allEntries[i].servicio || p.servicio || '';
      allWorkerPaths[p._folder] = p._basePath;
      workers.push(p);
    }

    // Sort by most recently active
    workers.sort(function(a, b) {
      return (b.last_active || '').localeCompare(a.last_active || '');
    });

    allWorkers = workers;
    computeServiceCounts();

    // 4. Process preloaded date folders
    var todayS = todayStr();

    var dataChanged = false;
    for (var wi = 0; wi < workers.length; wi++) {
      var wId = workers[wi]._folder || workers[wi].worker_id;
      var dateItems = dateResults[wi].filter(function(i) {
        return i.id === null && i.name && i.name.match(/^\d{4}-\d{2}-\d{2}$/);
      });
      dateItems.sort(function(a, b) { return b.name.localeCompare(a.name); });

      var newDates = dateItems.map(function(d) { return d.name; });
      var oldInfo = allWorkerFiles[wId];
      var oldDates = oldInfo ? oldInfo.dates : [];

      if (!oldInfo || newDates.length !== oldDates.length || newDates.join(',') !== oldDates.join(',')) {
        dataChanged = true;
      }
      // Always reset loaded cache — files within a date can change between refreshes
      allWorkerFiles[wId] = { dates: newDates, loaded: {} };
    }

    // 5. Load legacy folders structure
    legacyFolders = [];
    for (var li = 0; li < legacyNames.length; li++) {
      legacyFolders.push({ name: legacyNames[li] });
    }

    // 6. Ready to render

    // 7. Render: always on first/manual load, on auto-refresh if viewing detail or data changed
    var viewingDetail = !!currentWorkerId;
    var shouldRender = isFirstLoad || !autoRefreshing || dataChanged || viewingDetail;

    if (shouldRender) {
      lbRegId = 0; lbRegistry = {};
      if (viewingDetail) {
        renderDetailView(currentWorkerId);
      } else {
        renderDirectory();
      }
      renderLegacy();
    }

    // 8. Auto-cleanup once per day
    var lastClean = localStorage.getItem('wichanzao_pc_lastclean') || '';
    var todayClean = todayStr();
    if (lastClean !== todayClean) {
      autoCleanup();
      localStorage.setItem('wichanzao_pc_lastclean', todayClean);
    }

  } catch (err) {
    console.error('Load error:', err);
    container.innerHTML = '<div class="empty-state"><div class="icon">&#9888;</div><h3>Error de conexion</h3><p>' + escHtml(err.message) + '</p></div>';
  }

  isLoading = false;
}

  'medicina':       { icon: '&#129658;', bg: 'rgba(78,205,196,.12)', color: '#4ECDC4' },
  'enfermeria':     { icon: '&#128137;', bg: 'rgba(56,161,105,.12)', color: '#38A169' },

function computeServiceCounts() {
  _serviceCounts = {};
  for (var k = 0; k < SERVICIOS_KEYS.length; k++) _serviceCounts[SERVICIOS_KEYS[k]] = 0;
  for (var i = 0; i < allWorkers.length; i++) {
    var ws = allWorkers[i]._servicio || allWorkers[i].servicio || '';
    if (_serviceCounts[ws] !== undefined) _serviceCounts[ws]++;
  }
}

function renderServiceHub() {
  var html = '<div class="service-hub">';
  html += '<h2>Centro de Salud Wichanzao</h2>';
  html += '<p>Selecciona un servicio para ver sus documentos</p>';
  html += '<div class="service-grid">';

  for (var k = 0; k < SERVICIOS_KEYS.length; k++) {
    var key = SERVICIOS_KEYS[k];
    var s = SERVICIOS[key];
    var si = SERVICE_ICONS[key];
    var count = _serviceCounts[key] || 0;

    html += '<div class="service-card" onclick="setServicioFilter(\'' + key + '\')">';
    html += '<div class="service-icon" style="background:' + si.bg + '">' + si.icon + '</div>';
    html += '<div class="service-name">' + s.label + '</div>';
    html += '<div class="service-count">' + count + ' usuario' + (count !== 1 ? 's' : '') + '</div>';
    html += '</div>';
  }

  html += '</div></div>';
  return html;
}

function renderDirectory() {
  var container = document.getElementById('workersContainer');
  var query = document.getElementById('searchInput').value.toLowerCase().trim();

  // Show service hub if no servicio selected and no search query
  if ((!servicioFilter || servicioFilter === 'all') && !query) {
    container.innerHTML = renderServiceHub();
    return;
  }

  var threeMonthsMs = 90 * 24 * 60 * 60 * 1000;
  var now = Date.now();
  var hasServicio = servicioFilter && servicioFilter !== 'all';

  // Single-pass filtering (combined active + query + servicio)
  var filtered = [];
  for (var fi = 0; fi < allWorkers.length; fi++) {
    var w = allWorkers[fi];
    // Activity check
    if (w.last_active && (now - new Date(w.last_active).getTime()) >= threeMonthsMs) continue;
    // Servicio check
    if (hasServicio && (w._servicio || w.servicio || '') !== servicioFilter) continue;
    // Search check
    if (query && !w.name.toLowerCase().includes(query) && !(w.area || '').toLowerCase().includes(query)) continue;
    filtered.push(w);
  }

  dirFilteredCache = filtered;
  dirCurrentPage = 0;

  // Back to hub header
  var sLabel = hasServicio && SERVICIOS[servicioFilter] ? SERVICIOS[servicioFilter].label : '';
  var headerHtml = '';
  if (sLabel && !query) {
    headerHtml += '<div style="display:flex;align-items:center;gap:12px;margin-bottom:18px">';
    headerHtml += '<button onclick="setServicioFilter(\'all\')" style="background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:inherit;font-size:13px;font-weight:700;color:var(--tl);padding:8px 14px;border-radius:8px;transition:background .2s" onmouseover="this.style.background=\'rgba(78,205,196,.08)\'" onmouseout="this.style.background=\'none\'">';
    headerHtml += '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="m15 18-6-6 6-6"/></svg>';
    headerHtml += 'Servicios</button>';
    headerHtml += '<h3 style="font-family:Playfair Display,serif;font-size:20px;font-weight:900;color:var(--n1)">' + sLabel + '</h3>';
    headerHtml += '</div>';
  }

  if (!filtered.length) {
    container.innerHTML = headerHtml + '<div class="empty-state"><div class="icon">&#128101;</div><h3>Sin trabajadores</h3><p>Cuando el personal se registre en la app movil, apareceran aqui.</p></div>';
    return;
  }

  // Paginated rendering: show first page
  var pageEnd = Math.min(DIR_PAGE_SIZE, filtered.length);
  var html = headerHtml + '<div class="workers-grid" id="workersGrid">';
  html += renderWorkerCards(filtered, 0, pageEnd);
  html += '</div>';

  // "Load more" button if there are more workers
  if (filtered.length > DIR_PAGE_SIZE) {
    html += '<div id="loadMoreWrap" style="text-align:center;padding:20px">';
    html += '<button class="tb-btn primary" onclick="loadMoreWorkers()" style="font-size:13px;padding:10px 28px">';
    html += 'Mostrar mas (' + (filtered.length - DIR_PAGE_SIZE) + ' restantes)</button></div>';
  }

  container.innerHTML = html;

  // Event delegation for worker cards
  var grid = document.getElementById('workersGrid');
  if (grid) {
    grid.onclick = function(e) {
      var card = e.target.closest('.worker-card');
      if (card && card.dataset.wid) openWorkerDetail(card.dataset.wid);
    };
  }
}

function renderWorkerCards(list, start, end) {
  var html = '';
  for (var i = start; i < end; i++) {
    var w = list[i];
    var act = activityInfo(w.last_active);
    var wId = w._folder || w.worker_id;
    var fileInfo = allWorkerFiles[wId];
    var dateCount = fileInfo ? fileInfo.dates.length : 0;

    html += '<div class="worker-card" data-wid="' + escHtml(wId) + '">';
    html += '<div class="avatar md" style="background:' + (w.avatar_color || '#4ECDC4') + '">';
    html += getInitials(w.name);
    html += '<span class="activity-dot ' + act.color + '"></span>';
    html += '</div>';
    html += '<div class="worker-info">';
    html += '<div class="worker-name">' + escHtml(w.name) + '</div>';
    html += '<div class="worker-area">' + escHtml(w.area || 'Sin rol') + '</div>';
    html += '<div class="worker-time">' + act.label + (dateCount > 0 ? ' &middot; ' + dateCount + ' fecha(s)' : '') + '</div>';
    html += '</div>';
    html += '<span class="worker-arrow">&rsaquo;</span>';
    html += '</div>';
  }
  return html;
}

function loadMoreWorkers() {
  dirCurrentPage++;
  var start = dirCurrentPage * DIR_PAGE_SIZE;
  var end = Math.min(start + DIR_PAGE_SIZE, dirFilteredCache.length);
  var grid = document.getElementById('workersGrid');
  if (grid) {
    grid.insertAdjacentHTML('beforeend', renderWorkerCards(dirFilteredCache, start, end));
  }
  var wrap = document.getElementById('loadMoreWrap');
  if (wrap) {
    var remaining = dirFilteredCache.length - end;
    if (remaining <= 0) {
      wrap.remove();
    } else {
      wrap.innerHTML = '<button class="tb-btn primary" onclick="loadMoreWorkers()" style="font-size:13px;padding:10px 28px">Mostrar mas (' + remaining + ' restantes)</button>';
    }
  }
}

function buildSkeletonGrid() {
  var html = '<div class="workers-grid">';
  for (var i = 0; i < 6; i++) {
    html += '<div class="skel-card"><div class="skel-circle"></div><div class="skel-lines"><div class="skel-line"></div><div class="skel-line short"></div></div></div>';
  }
  html += '</div>';
  return html;
}

function renderLegacy() {

    return;
  }

  section.style.display = 'block';
  var html = '<div class="legacy-title">';
  html += '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>';
  html += 'Archivos anteriores';
  html += '<span class="badge">Legacy</span>';
  html += '</div>';

  for (var i = 0; i < legacyFolders.length; i++) {
    var lf = legacyFolders[i];
    var fname = lf.name;
    var isOpen = expandedLegacy[fname] || false;

    html += '<div class="date-section">';
    html += '<div class="date-header' + (isOpen ? ' open' : '') + '" onclick="toggleLegacyFolder(\'' + escHtml(fname) + '\')">';
    html += '<span class="date-arrow' + (isOpen ? ' open' : '') + '">&#9654;</span>';
    html += '<div class="date-title"><h3>';
    html += '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>';
    html += escHtml(fname.replace(/_/g, ' '));
    html += '</h3></div>';
    html += '<div class="date-actions">';
    html += '<button class="date-btn" onclick="event.stopPropagation();dlLegacyZip(\'' + escHtml(fname) + '\')">&#128230; ZIP</button>';
    html += '</div>';
    html += '</div>';
    html += '<div class="date-body' + (isOpen ? ' open' : '') + '" id="legacy_' + fname + '">';
    if (isOpen && !lf._loaded) {
      html += '<div style="padding:20px;text-align:center;color:var(--t3)"><div class="skel-line" style="width:60%;margin:0 auto"></div></div>';
    }
    html += '</div>';
    html += '</div>';
  }
  section.innerHTML = html;

  // Load content for expanded legacy folders
  for (var j = 0; j < legacyFolders.length; j++) {
    if (expandedLegacy[legacyFolders[j].name]) {
      loadLegacyFolder(legacyFolders[j].name);
    }
  }
}

async function toggleLegacyFolder(fname) {
  expandedLegacy[fname] = !expandedLegacy[fname];
  renderLegacy();
  if (expandedLegacy[fname]) {
    loadLegacyFolder(fname);
  }
}

async function loadLegacyFolder(fname) {
  var el = document.getElementById('legacy_' + fname);
  if (!el) return;
  var lf = legacyFolders.find(function(f) { return f.name === fname; });
  if (lf && lf._loaded && lf._docs) {
    renderLegacyFiles(el, lf._docs, fname);
    return;
  }

  el.innerHTML = '<div style="padding:20px;text-align:center;color:var(--t3)"><div class="skel-line" style="width:60%;margin:0 auto 8px"></div><div class="skel-line" style="width:40%;margin:0 auto"></div></div>';

  try {
    var items = await sbList(fname + '/');
    var docs = groupFiles(items, fname);
    if (lf) { lf._loaded = true; lf._docs = docs; }
    renderLegacyFiles(el, docs, fname);
  } catch (e) {
    el.innerHTML = '<div style="padding:16px;color:var(--danger);font-size:12px">Error: ' + escHtml(e.message) + '</div>';
  }
}

function renderLegacyFiles(el, docs, folderName) {
  if (!docs.length) {
    el.innerHTML = '<div style="padding:16px;text-align:center;color:var(--t3);font-size:12px">Sin archivos</div>';
    return;
  }
  var html = '';
  for (var i = 0; i < docs.length; i++) {
    html += renderFileCard(docs[i], folderName);
  }
  el.innerHTML = html;
}

async function dlLegacyZip(fname) {
  if (!window.JSZip) { showToast('JSZip no cargado', 'error'); return; }
  var lf = legacyFolders.find(function(f) { return f.name === fname; });
  if (!lf || !lf._docs) {
    showToast('Carga la carpeta primero', 'info');
    return;
  }
  await downloadDocsAsZip(lf._docs, fname.replace(/_/g, ' '));
}

   RENDER DETAIL VIEW

function groupDatesByMonth(dates) {
  var monthNames = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  var groups = [];
  var map = {};

  for (var i = 0; i < dates.length; i++) {
    var d = dates[i];
    var parts = d.split('-');
    var key = parts[0] + '-' + parts[1]; // YYYY-MM
    if (!map[key]) {
      map[key] = { key: key, label: monthNames[parseInt(parts[1]) - 1] + ' ' + parts[0], dates: [] };
      groups.push(map[key]);
    }
    map[key].dates.push(d);
  }

  return groups;
}

function renderDetailView(wId) {
  var detailEl = document.getElementById('viewDetail');
  var w = allWorkers.find(function(x) { return (x._folder || x.worker_id) === wId; });
  if (!w) {
    detailEl.innerHTML = '<div class="empty-state"><h3>Trabajador no encontrado</h3></div>';
    return;
  }

  var act = activityInfo(w.last_active);
  var fileInfo = allWorkerFiles[wId];
  var dates = fileInfo ? fileInfo.dates : [];

  var filteredDates = dates;

  var html = '';

  // Header
  html += '<div class="detail-header">';
  html += '<button class="detail-back" onclick="closeDetail()" title="Volver">';
  html += '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="m15 18-6-6 6-6"/></svg>';
  html += '</button>';
  html += '<div class="avatar lg" style="background:' + (w.avatar_color || '#4ECDC4') + '">' + getInitials(w.name) + '</div>';
  html += '<div class="detail-info">';
  html += '<div class="detail-name">' + escHtml(w.name) + '</div>';
  html += '<div class="detail-area-row">';
  var sLabel = w._servicio && SERVICIOS[w._servicio] ? SERVICIOS[w._servicio].label : '';
  html += '<span class="detail-area">' + escHtml(w.area || 'Sin rol') + (sLabel ? ' &middot; ' + escHtml(sLabel) : '') + '</span>';
  if (w.turno) html += '<span class="detail-area" style="background:rgba(212,168,83,.1);color:var(--gd2)">Turno ' + escHtml(w.turno) + '</span>';
  html += '<span class="detail-activity"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--' + (act.color === 'green' ? 'success' : act.color === 'yellow' ? 'warn' : 't3') + ');vertical-align:middle;margin-right:4px"></span>' + act.label + '</span>';
  html += '</div></div>';
  html += '<div class="detail-actions">';
  html += '<button class="dl-btn gold" onclick="dlWorkerZip(\'' + escHtml(wId) + '\')">&#128230; Descargar todo ZIP</button>';
  html += '</div>';
  html += '</div>';

  // Group dates by month
  if (!filteredDates.length) {
    html += '<div class="empty-state"><div class="icon">&#128196;</div><h3>Sin archivos</h3><p>No hay archivos en el rango seleccionado.</p></div>';
  } else {
    var monthGroups = groupDatesByMonth(filteredDates);
    var todayS = todayStr();
    var currentMonth = todayS.substring(0, 7); // YYYY-MM

    for (var mi = 0; mi < monthGroups.length; mi++) {
      var mg = monthGroups[mi];
      var isCurrentMonth = mg.key === currentMonth;
      var monthKey = wId + '_month_' + mg.key;
      var monthOpen = expandedDates[monthKey] !== undefined ? expandedDates[monthKey] : (mi === 0); // First month always open

      html += '<div class="month-group">';
      html += '<div class="month-header" onclick="toggleMonth(\'' + escHtml(wId) + '\',\'' + mg.key + '\')">';
      html += '<span class="month-arrow' + (monthOpen ? ' open' : '') + '">&#9654;</span>';
      html += '<h2>' + mg.label + (isCurrentMonth ? ' <span style="font-family:Manrope;font-size:11px;font-weight:700;background:var(--tl);color:var(--n1);padding:2px 8px;border-radius:4px;vertical-align:middle;margin-left:6px">MES ACTUAL</span>' : '') + '</h2>';
      html += '<span class="month-count">' + mg.dates.length + ' dia(s)</span>';
      html += '</div>';
      html += '<div class="month-body' + (monthOpen ? ' open' : '') + '">';

      if (monthOpen) {
        for (var i = 0; i < mg.dates.length; i++) {
          var date = mg.dates[i];
          var isToday = date === todayS;
          var dateKey = wId + '_' + date;
          var isOpen = expandedDates[dateKey] !== undefined ? expandedDates[dateKey] : isToday;
          var loaded = fileInfo && fileInfo.loaded[date];

          html += '<div class="date-section">';
          html += '<div class="date-header' + (isOpen ? ' open' : '') + '" onclick="event.stopPropagation();toggleDateSection(\'' + escHtml(wId) + '\',\'' + date + '\')">';
          html += '<span class="date-arrow' + (isOpen ? ' open' : '') + '">&#9654;</span>';
          html += '<div class="date-title"><h3>' + formatDate(date);
          if (isToday) html += ' <span class="today-badge">Hoy</span>';
          html += '</h3>';
          if (loaded) {
            html += '<div class="count">' + loaded.length + ' archivo(s)</div>';
          }
          html += '</div>';
          html += '<div class="date-actions">';
          html += '<button class="date-btn" onclick="event.stopPropagation();dlDateZip(\'' + escHtml(wId) + '\',\'' + date + '\')">&#128230; ZIP</button>';
          html += '</div>';
          html += '</div>';

          html += '<div class="date-body' + (isOpen ? ' open' : '') + '" id="dbody_' + dateKey.replace(/[^a-zA-Z0-9_-]/g, '_') + '">';
          if (isOpen && loaded) {
            for (var fi = 0; fi < loaded.length; fi++) {
              html += renderFileCard(loaded[fi], (allWorkerPaths[wId] || 'workers/' + wId) + '/' + date);
            }
            if (!loaded.length) {
              html += '<div style="padding:16px;text-align:center;color:var(--t3);font-size:12px">Sin archivos</div>';
            }
          } else if (isOpen) {
            html += '<div style="padding:20px;text-align:center;color:var(--t3)"><div class="skel-line" style="width:60%;margin:0 auto 8px"></div><div class="skel-line" style="width:40%;margin:0 auto"></div></div>';
          }
          html += '</div>';
          html += '</div>';
        }
      }

      html += '</div>'; // month-body
      html += '</div>'; // month-group
    }
  }

  detailEl.innerHTML = html;

  // Load files for expanded dates (use cached monthGroups, avoid redundant calls)
  var _mGroups = groupDatesByMonth(filteredDates);
  var _firstMonthDates = _mGroups.length > 0 ? _mGroups[0].dates.length : 0;
  var _firstMonthSet = {};
  if (_mGroups.length > 0) {
    for (var fm = 0; fm < _mGroups[0].dates.length; fm++) _firstMonthSet[_mGroups[0].dates[fm]] = true;
  }
  var _today = todayStr();
  for (var d = 0; d < filteredDates.length; d++) {
    var dd = filteredDates[d];
    var dk = wId + '_' + dd;
    var ddMonth = dd.substring(0, 7);
    var monthK = wId + '_month_' + ddMonth;
    var monthIsOpen = expandedDates[monthK] !== undefined ? expandedDates[monthK] : !!_firstMonthSet[dd];
    var isExp = expandedDates[dk] !== undefined ? expandedDates[dk] : (dd === _today);
    if (monthIsOpen && isExp && !(fileInfo && fileInfo.loaded[dd])) {
      loadDateFiles(wId, dd);
    }
  }
}

/* =========================================================
   DATE SECTION TOGGLE & FILE LOADING
   ========================================================= */
function toggleMonth(wId, monthKey) {
  var mk = wId + '_month_' + monthKey;
  var wasOpen = expandedDates[mk] !== undefined ? expandedDates[mk] : true;
  expandedDates[mk] = !wasOpen;

  // Try targeted DOM update first
  var header = event && event.currentTarget;
  if (header) {
    var monthGroup = header.parentElement;
    var body = monthGroup ? monthGroup.querySelector('.month-body') : null;
    var arrow = header.querySelector('.month-arrow');
    if (body && arrow) {
      if (!wasOpen) {
        body.classList.remove('open');
        arrow.classList.remove('open');
      } else {
        body.classList.add('open');
        arrow.classList.add('open');
        // Render month content if opening and empty
        if (!body.children.length) {
          renderDetailView(wId);
          return;
        }
      }
      return;
    }
  }
  renderDetailView(wId);
}

function toggleDateSection(wId, date) {
  var dk = wId + '_' + date;
  var wasOpen = expandedDates[dk] !== undefined ? expandedDates[dk] : (date === todayStr());
  expandedDates[dk] = !wasOpen;

  // Try targeted DOM update
  var header = event && event.currentTarget;
  if (header) {
    var dateSection = header.parentElement;
    var bodyId = 'dbody_' + (wId + '_' + date).replace(/[^a-zA-Z0-9_-]/g, '_');
    var body = document.getElementById(bodyId);
    var arrow = header.querySelector('.date-arrow');
    if (body && arrow) {
      if (!wasOpen) {
        body.classList.remove('open');
        header.classList.remove('open');
        arrow.classList.remove('open');
      } else {
        body.classList.add('open');
        header.classList.add('open');
        arrow.classList.add('open');
        // Load files if not yet loaded
        var fileInfo = allWorkerFiles[wId];
        if (fileInfo && !fileInfo.loaded[date]) {
          loadDateFiles(wId, date);
        }
      }
      return;
    }
  }
  renderDetailView(wId);
}

async function loadDateFiles(wId, date) {
  var fileInfo = allWorkerFiles[wId];
  if (!fileInfo) return;
  if (fileInfo.loaded[date]) return;

  try {
    var basePath = allWorkerPaths[wId] || 'workers/' + wId;
    var items = await sbList(basePath + '/' + date + '/');
    var docs = groupFiles(items, basePath + '/' + date);
    fileInfo.loaded[date] = docs;
    if (currentWorkerId === wId) {
      // Targeted DOM update: only update the specific date body
      var dk = wId + '_' + date;
      var bodyEl = document.getElementById('dbody_' + dk.replace(/[^a-zA-Z0-9_-]/g, '_'));
      if (bodyEl) {
        var html = '';
        for (var fi = 0; fi < docs.length; fi++) {
          html += renderFileCard(docs[fi], basePath + '/' + date);
        }
        if (!docs.length) {
          html = '<div style="padding:16px;text-align:center;color:var(--t3);font-size:12px">Sin archivos</div>';
        }
        bodyEl.innerHTML = html;
        // Update file count in header
        var dateSection = bodyEl.parentElement;
        if (dateSection) {
          var countEl = dateSection.querySelector('.count');
          if (countEl) countEl.textContent = docs.length + ' archivo(s)';
          else {
            var titleDiv = dateSection.querySelector('.date-title');
            if (titleDiv && !titleDiv.querySelector('.count')) {
              titleDiv.insertAdjacentHTML('beforeend', '<div class="count">' + docs.length + ' archivo(s)</div>');
            }
          }
        }
      } else {
        renderDetailView(wId);
      }
    }
  } catch (e) {
    var dk = wId + '_' + date;
    var bodyEl = document.getElementById('dbody_' + dk.replace(/[^a-zA-Z0-9_-]/g, '_'));
    if (bodyEl) {
      bodyEl.innerHTML = '<div style="padding:16px;color:var(--danger);font-size:12px">Error al cargar: ' + escHtml(e.message) + '</div>';
    }
  }
}

/* =========================================================
   RENDER FILE CARD
   ========================================================= */
function renderFileCard(doc, pathPrefix) {
  var thumbSrc = doc.pages.length > 0 ? doc.pages[0].url : '';
  var typeBadge = '';
  var typeClass = '';
  var meta = '';

  if (doc.type === 'foto') {
    typeBadge = 'FOTO'; typeClass = 'badge-foto';
    meta = 'Foto &middot; ' + fmtSize(doc.totalSize);
  } else if (doc.type === 'pdf-file') {
    typeBadge = 'PDF'; typeClass = 'badge-pdf';
    meta = 'PDF &middot; ' + fmtSize(doc.totalSize);
  } else {
    typeBadge = 'PDF'; typeClass = 'badge-pdf';
    meta = 'PDF &middot; ' + doc.pages.length + ' pags &middot; ' + fmtSize(doc.totalSize);
  }

  var html = '<div class="file-card">';

  if (thumbSrc) {
    var lbData = doc.pages.map(function(p) { return { url: p.url, caption: doc.name + (doc.pages.length > 1 ? ' - Pag ' + p.num : ''), path: pathPrefix + '/' + p.rawName }; });
    var rid = 'lb' + (lbRegId++);
    lbRegistry[rid] = lbData;
    html += '<img class="file-thumb" src="' + thumbSrc + '" onclick="openLbReg(\'' + rid + '\',0)" onerror="this.style.background=\'var(--s2)\';this.style.border=\'1px dashed var(--bd)\'">';
  } else {
    html += '<div class="file-thumb" style="display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--t3)">&#128196;</div>';
  }

  html += '<div class="file-content">';
  html += '<div class="file-head">';
  html += '<span class="file-name">' + escHtml(doc.name) + '</span>';
  html += '<span class="file-type-badge ' + typeClass + '">' + typeBadge + '</span>';
  html += '</div>';
  html += '<div class="file-meta">' + meta + '</div>';
  html += '<div class="file-actions">';

  if (doc.type === 'pdf-file') {
    html += '<button class="dl-btn pdf" onclick="forceDl(\'' + doc.pdfUrl + '\',\'' + escHtml(doc.name) + '.pdf\')">&#128196; Descargar PDF</button>';
  } else if (doc.type === 'pdf') {
    if (doc.pdfUrl) {
      html += '<button class="dl-btn pdf" onclick="forceDl(\'' + doc.pdfUrl + '\',\'' + escHtml(doc.name) + '.pdf\')">&#128196; Descargar PDF</button>';
    } else {
      html += '<button class="dl-btn pdf" onclick="generatePdf(this)" data-doc="' + escHtml(JSON.stringify({ name: doc.name, pages: doc.pages.map(function(p) { return { url: p.url }; }) })) + '">&#128196; Generar PDF</button>';
    }
    html += '<button class="dl-btn secondary" onclick="dlMultipleImages(this)" data-pages="' + escHtml(JSON.stringify(doc.pages.map(function(p) { return { url: p.url, name: doc.name + '_pag' + p.num + '.jpg' }; }))) + '">&#128444; Imagenes</button>';
  } else {
    html += '<button class="dl-btn primary" onclick="forceDl(\'' + doc.pages[0].url + '\',\'' + escHtml(doc.name) + '.jpg\')">&#128190; Descargar JPG</button>';
  }

  html += '</div>';

  // Page count indicator for multi-page documents
  if (doc.pages.length > 1) {
    html += '<div style="margin-top:6px;font-size:11px;color:var(--t3);font-weight:600">' + doc.pages.length + ' paginas &middot; Click en la imagen para ver todas</div>';
  }

  html += '</div></div>';
  return html;
}

/* =========================================================
   DOWNLOADS
   ========================================================= */
async function forceDl(url, filename) {
  try {
    showToast('Descargando: ' + filename, 'info');
    var res = await fetch(url);
    var blob = await res.blob();
    var blobUrl = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = blobUrl;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function() { URL.revokeObjectURL(blobUrl); }, 2000);
    showToast('Descargado: ' + filename, 'success');
  } catch (e) {
    console.error('Download error:', e);
    window.open(url, '_blank');
  }
}

// Parallel batch fetch helper: downloads N items at a time
var DL_BATCH_SIZE = 5;
async function fetchBatch(urls, onProgress) {
  var results = new Array(urls.length);
  var done = 0;
  var i = 0;

  async function next() {
    var idx = i++;
    if (idx >= urls.length) return;
    try {
      var res = await fetch(urls[idx]);
      results[idx] = await res.blob();
    } catch (e) {
      results[idx] = null;
    }
    done++;
    if (onProgress) onProgress(done, urls.length);
    await next();
  }

  var workers = [];
  for (var w = 0; w < Math.min(DL_BATCH_SIZE, urls.length); w++) {
    workers.push(next());
  }
  await Promise.all(workers);
  return results;
}

function dlMultipleImages(btn) {
  try {
    var pages = JSON.parse(btn.getAttribute('data-pages'));
    showToast('Descargando ' + pages.length + ' imagenes...', 'info');
    var urls = pages.map(function(p) { return p.url; });
    fetchBatch(urls, function(done, total) {
      if (done === total) showToast(total + ' imagenes descargadas', 'success');
    }).then(function(blobs) {
      for (var i = 0; i < blobs.length; i++) {
        if (!blobs[i]) continue;
        var blobUrl = URL.createObjectURL(blobs[i]);
        var a = document.createElement('a');
        a.href = blobUrl;
        a.download = pages[i].name;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        (function(u) { setTimeout(function() { URL.revokeObjectURL(u); }, 2000); })(blobUrl);
      }
    });
  } catch (e) {
    showToast('Error al descargar', 'error');
  }
}

/* =========================================================
   PDF GENERATION
   ========================================================= */
async function generatePdf(btn) {
  if (!window.jspdf) { showToast('jsPDF no cargado aun', 'error'); return; }
  var docData;
  try { docData = JSON.parse(btn.getAttribute('data-doc')); } catch (e) { return; }

  btn.disabled = true;
  var origText = btn.innerHTML;
  btn.innerHTML = '&#9203; Generando...';

  try {
    // Load all images in parallel
    var imgPromises = docData.pages.map(function(p) { return loadImage(p.url); });
    var images = await Promise.all(imgPromises);

    var pdf = new jspdf.jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    var pw = pdf.internal.pageSize.getWidth();
    var ph = pdf.internal.pageSize.getHeight();

    for (var i = 0; i < images.length; i++) {
      if (i > 0) pdf.addPage();
      var img = images[i];
      var ratio = Math.min(pw / img.width, ph / img.height);
      var w = img.width * ratio;
      var h = img.height * ratio;
      pdf.addImage(img.src, 'JPEG', (pw - w) / 2, (ph - h) / 2, w, h);
    }

    pdf.save(docData.name + '.pdf');
    showToast('PDF generado: ' + docData.name, 'success');
  } catch (e) {
    showToast('Error generando PDF: ' + e.message, 'error');
    console.error(e);
  }

  btn.disabled = false;
  btn.innerHTML = origText;
}

function loadImage(url) {
  return new Promise(function(resolve, reject) {
    var img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = function() { resolve(img); };
    img.onerror = function() { reject(new Error('No se pudo cargar imagen')); };
    img.src = url;
  });
}

/* =========================================================
   ZIP DOWNLOADS
   ========================================================= */
function showProgress(title) {
  document.getElementById('progressTitle').textContent = title || 'Preparando descarga...';
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('progressText').textContent = '0%';
  document.getElementById('progressOverlay').classList.add('on');
}

function updateProgress(pct, text) {
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = text || (Math.round(pct) + '%');
}

function hideProgress() {
  document.getElementById('progressOverlay').classList.remove('on');
}

async function downloadDocsAsZip(docs, zipName) {
  if (!window.JSZip) { showToast('JSZip no cargado', 'error'); return; }
  showProgress('Preparando ZIP: ' + zipName);

  try {
    var zip = new JSZip();
    var folder = zip.folder(zipName);

    // Build flat list of all files to download
    var files = [];
    for (var d = 0; d < docs.length; d++) {
      var doc = docs[d];
      for (var pi = 0; pi < doc.pages.length; pi++) {
        var pageSuffix = doc.pages.length > 1 ? '_pag' + doc.pages[pi].num : '';
        files.push({ url: doc.pages[pi].url, name: doc.name + pageSuffix + '.jpg' });
      }
      if (doc.pdfUrl) {
        files.push({ url: doc.pdfUrl, name: doc.name + '.pdf' });
      }
    }

    // Download all files in parallel batches
    var urls = files.map(function(f) { return f.url; });
    var blobs = await fetchBatch(urls, function(done, total) {
      updateProgress((done / total) * 90, 'Descargando archivos... ' + done + '/' + total);
    });

    for (var i = 0; i < files.length; i++) {
      if (blobs[i]) folder.file(files[i].name, blobs[i]);
    }

    updateProgress(95, 'Generando ZIP...');
    var content = await zip.generateAsync({ type: 'blob' });
    var url = URL.createObjectURL(content);
    var a = document.createElement('a');
    a.href = url;
    a.download = zipName + '.zip';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function() { URL.revokeObjectURL(url); }, 2000);

    updateProgress(100, 'Completado!');
    setTimeout(hideProgress, 800);
    showToast('ZIP descargado: ' + zipName, 'success');
  } catch (e) {
    hideProgress();
    showToast('Error creando ZIP: ' + e.message, 'error');
    console.error(e);
  }
}

async function dlDateZip(wId, date) {
  var fileInfo = allWorkerFiles[wId];
  if (!fileInfo || !fileInfo.loaded[date]) {
    showToast('Espera a que carguen los archivos', 'info');
    await loadDateFiles(wId, date);
    fileInfo = allWorkerFiles[wId];
    if (!fileInfo || !fileInfo.loaded[date]) return;
  }
  var docs = fileInfo.loaded[date];
  if (!docs.length) { showToast('Sin archivos en esta fecha', 'info'); return; }

  var w = allWorkers.find(function(x) { return (x._folder || x.worker_id) === wId; });
  var wName = w ? w.name.replace(/\s+/g, '_') : wId;
  await downloadDocsAsZip(docs, wName + '_' + date);
}

async function dlWorkerZip(wId) {
  var fileInfo = allWorkerFiles[wId];
  if (!fileInfo) return;

  var w = allWorkers.find(function(x) { return (x._folder || x.worker_id) === wId; });
  var wName = w ? w.name.replace(/\s+/g, '_') : wId;

  if (!window.JSZip) { showToast('JSZip no cargado', 'error'); return; }
  showProgress('Preparando ZIP de ' + (w ? w.name : wId));

  try {
    var zip = new JSZip();
    var rootFolder = zip.folder(wName);
    var dates = fileInfo.dates;
    var basePath = allWorkerPaths[wId] || 'workers/' + wId;

    // Phase 1: Load all date file lists in parallel batches
    updateProgress(5, 'Listando archivos...');
    var datesToLoad = [];
    for (var di = 0; di < dates.length; di++) {
      if (!fileInfo.loaded[dates[di]]) datesToLoad.push(dates[di]);
    }

    // Load file lists in parallel (batch of 5)
    var listIdx = 0;
    async function loadNext() {
      var idx = listIdx++;
      if (idx >= datesToLoad.length) return;
      try {
        var date = datesToLoad[idx];
        var items = await sbList(basePath + '/' + date + '/');
        fileInfo.loaded[date] = groupFiles(items, basePath + '/' + date);
      } catch (e) {}
      await loadNext();
    }
    var listWorkers = [];
    for (var lw = 0; lw < Math.min(DL_BATCH_SIZE, datesToLoad.length); lw++) listWorkers.push(loadNext());
    await Promise.all(listWorkers);

    updateProgress(20, 'Preparando descarga...');

    // Phase 2: Build flat file list across all dates
    var allFiles = [];
    for (var di2 = 0; di2 < dates.length; di2++) {
      var date = dates[di2];
      var dateDocs = fileInfo.loaded[date];
      if (!dateDocs || !dateDocs.length) continue;
      for (var fi = 0; fi < dateDocs.length; fi++) {
        var doc = dateDocs[fi];
        for (var pi = 0; pi < doc.pages.length; pi++) {
          var pageSuffix = doc.pages.length > 1 ? '_pag' + doc.pages[pi].num : '';
          allFiles.push({ url: doc.pages[pi].url, path: date + '/' + doc.name + pageSuffix + '.jpg' });
        }
        if (doc.pdfUrl) {
          allFiles.push({ url: doc.pdfUrl, path: date + '/' + doc.name + '.pdf' });
        }
      }
    }

    // Phase 3: Download all files in parallel batches
    var urls = allFiles.map(function(f) { return f.url; });
    var blobs = await fetchBatch(urls, function(done, total) {
      updateProgress(20 + (done / total) * 65, 'Descargando... ' + done + '/' + total);
    });

    for (var i = 0; i < allFiles.length; i++) {
      if (blobs[i]) rootFolder.file(allFiles[i].path, blobs[i]);
    }

    updateProgress(90, 'Generando ZIP...');
    var content = await zip.generateAsync({ type: 'blob' });
    var url = URL.createObjectURL(content);
    var a = document.createElement('a');
    a.href = url;
    a.download = wName + '_todos.zip';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function() { URL.revokeObjectURL(url); }, 2000);

    updateProgress(100, 'Completado!');
    setTimeout(hideProgress, 800);
    showToast('ZIP descargado: ' + wName, 'success');
  } catch (e) {
    hideProgress();
    showToast('Error creando ZIP: ' + e.message, 'error');
    console.error(e);
  }
}

/* =========================================================
   AUTO-CLEANUP: delete files older than 3 months
   ========================================================= */
async function autoCleanup() {
  var cutoff = new Date();
  cutoff.setMonth(cutoff.getMonth() - 3);
  var cutoffStr = cutoff.toISOString().split('T')[0];

  var toDelete = [];

  for (var i = 0; i < allWorkers.length; i++) {
    var wId = allWorkers[i]._folder || allWorkers[i].worker_id;
    var fileInfo = allWorkerFiles[wId];
    if (!fileInfo) continue;

    for (var d = 0; d < fileInfo.dates.length; d++) {
      var date = fileInfo.dates[d];
      if (date < cutoffStr) {
        toDelete.push({ wId: wId, date: date });
      }
    }
  }

  if (!toDelete.length) return;

  console.log('Auto-cleanup: eliminando ' + toDelete.length + ' carpeta(s) de mas de 3 meses');

  var deleted = 0;
  for (var j = 0; j < toDelete.length; j++) {
    try {
      var path = (allWorkerPaths[toDelete[j].wId] || 'workers/' + toDelete[j].wId) + '/' + toDelete[j].date + '/';
      var files = await sbList(path);
      var paths = files.filter(function(f) { return f.name; }).map(function(f) { return path + f.name; });

      if (paths.length > 0) {
        await sbDelete(paths);
      }
      deleted++;

      // Remove from local state
      var fi = allWorkerFiles[toDelete[j].wId];
      if (fi) {
        fi.dates = fi.dates.filter(function(dd) { return dd !== toDelete[j].date; });
        delete fi.loaded[toDelete[j].date];
      }
    } catch (e) {
      console.warn('Auto-cleanup error:', toDelete[j], e);
    }
  }

  if (deleted > 0) {
    showToast(deleted + ' carpeta(s) antigua(s) eliminada(s) automaticamente', 'info');
    // Re-render without full reload
    if (currentWorkerId) {
      renderDetailView(currentWorkerId);
    } else {
      renderDirectory();
    }
  }
}

/* =========================================================
   LIGHTBOX
   ========================================================= */
function openLbReg(regId, startIndex) {
  var data = lbRegistry[regId];
  if (!data || !data.length) return;
  lightboxImages = data;
  lightboxIndex = startIndex || 0;
  showLightbox();
}

function showLightbox() {
  var lb = document.getElementById('lightbox');

  document.getElementById('lbPrev').style.display = lightboxImages.length > 1 ? 'flex' : 'none';
  document.getElementById('lbNext').style.display = lightboxImages.length > 1 ? 'flex' : 'none';

  // Preload all images with CORS for instant navigation + editing
  for (var i = 0; i < lightboxImages.length; i++) {
    var pre = new Image();
    pre.crossOrigin = 'anonymous';
    pre.src = lightboxImages[i].url;
  }

  updateLightboxUI();
  lb.classList.add('on');
  document.body.style.overflow = 'hidden';
}

function updateLightboxUI() {
  var current = lightboxImages[lightboxIndex];
  document.getElementById('lbImg').src = current.url;
  document.getElementById('lbCaption').textContent = current.caption || '';

  // Counter
  var counter = document.getElementById('lbCounter');
  counter.textContent = lightboxImages.length > 1 ? (lightboxIndex + 1) + ' / ' + lightboxImages.length : '';
  counter.style.display = lightboxImages.length > 1 ? '' : 'none';

  // Always show all action buttons
  document.getElementById('lbDlBtn').style.display = 'inline-flex';
  document.getElementById('lbEditBtn').style.display = 'inline-flex';
  document.getElementById('lbDelBtn').style.display = 'inline-flex';
}

function getLbPath(current) {
  if (current.path) return current.path;
  // Extract path from public URL
  var marker = '/storage/v1/object/public/' + BUCKET + '/';
  var idx = current.url.indexOf(marker);
  if (idx >= 0) return current.url.substring(idx + marker.length);
  return '';
}

function closeLightbox(e) {
  if (e && e.target && (e.target.tagName === 'IMG' || e.target.tagName === 'BUTTON')) return;
  document.getElementById('lightbox').classList.remove('on');
  document.body.style.overflow = '';
}

function navLightbox(dir) {
  lightboxIndex += dir;
  if (lightboxIndex < 0) lightboxIndex = lightboxImages.length - 1;
  if (lightboxIndex >= lightboxImages.length) lightboxIndex = 0;
  updateLightboxUI();
}

function editFromLightbox() {
  var current = lightboxImages[lightboxIndex];
  if (!current) return;
  var path = getLbPath(current);
  if (!path) { showToast('No se puede editar este archivo', 'error'); return; }
  closeLightbox();
  openPcEditor(current.url, path, current.caption || 'Imagen');
}

function downloadFromLightbox() {
  var current = lightboxImages[lightboxIndex];
  if (!current) return;
  var filename = (current.caption || 'imagen').replace(/[^a-zA-Z0-9_\- ]/g, '') + '.jpg';
  var path = getLbPath(current);

  // If we have an edited version in memory, download that directly
  if (path && editedImages[path]) {
    var dataUrl = editedImages[path];
    var bin = atob(dataUrl.split(',')[1]);
    var arr = new Uint8Array(bin.length);
    for (var i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
    var blob = new Blob([arr], { type: 'image/jpeg' });
    var blobUrl = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = blobUrl;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function() { URL.revokeObjectURL(blobUrl); }, 2000);
    showToast('Descargado: ' + filename, 'success');
    return;
  }

  // Otherwise download from server (authenticated, no cache)
  if (path) {
    showToast('Descargando: ' + filename, 'info');
    fetch(SB_URL + '/storage/v1/object/' + BUCKET + '/' + path, {
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY },
      cache: 'no-store'
    }).then(function(res) {
      if (!res.ok) throw new Error('Error ' + res.status);
      return res.blob();
    }).then(function(blob) {
      var blobUrl = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = blobUrl;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(function() { URL.revokeObjectURL(blobUrl); }, 2000);
      showToast('Descargado: ' + filename, 'success');
    }).catch(function(e) {
      console.error('Auth download failed, fallback:', e);
      forceDl(current.url, filename);
    });
  } else {
    forceDl(current.url, filename);
  }
}

function deleteFromLightbox() {
  var current = lightboxImages[lightboxIndex];
  if (!current) return;
  var path = getLbPath(current);
  if (!path) { showToast('No se puede eliminar este archivo', 'error'); return; }
  if (!confirm('¿Eliminar esta imagen?\n\nEsta accion no se puede deshacer.')) return;

  closeLightbox();
  doDeletePcFile(path);
}

/* =========================================================

   ========================================================= */
function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + (type || 'info');
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(function() { t.classList.remove('show'); }, 3000);
}

/* =========================================================
   AUTO-REFRESH
   ========================================================= */
function resetCountdown() {
  countdownValue = REFRESH_INTERVAL;
  updateCountdownDisplay();
}

function updateCountdownDisplay() {
  var el = document.getElementById('countdown');
  if (el) el.textContent = countdownValue;
}

function startAutoRefresh() {
  if (countdownTimer) clearInterval(countdownTimer);
  countdownTimer = setInterval(function() {
    countdownValue--;
    updateCountdownDisplay();
    if (countdownValue <= 0) {
      autoRefreshing = true;
      loadAllData().then(function() { autoRefreshing = false; }).catch(function() { autoRefreshing = false; });
    }
  }, 1000);
}

/* =========================================================
   KEYBOARD SHORTCUTS
   ========================================================= */
document.addEventListener('keydown', function(e) {
  // Ctrl+F -> focus search
  if ((e.ctrlKey || e.metaKey) && e.key === 'f') {
    e.preventDefault();
    document.getElementById('searchInput').focus();
    document.getElementById('searchInput').select();
  }

  // Escape -> close lightbox or go back to directory
  if (e.key === 'Escape') {
    var pce = document.getElementById('pcEditor');
    if (pce.classList.contains('on')) {
      closePcEditor();
      return;
    }
    var lb = document.getElementById('lightbox');
    if (lb.classList.contains('on')) {
      closeLightbox();
    } else if (currentWorkerId) {
      closeDetail();
    }
  }

  // Left/Right arrows in lightbox
  if (document.getElementById('lightbox').classList.contains('on')) {
    if (e.key === 'ArrowLeft') navLightbox(-1);
    if (e.key === 'ArrowRight') navLightbox(1);
  }
});

/* =========================================================
   PC PHOTO EDITOR
   ========================================================= */
function openPcEditor(url, storagePath, docName) {
  pceUrl = url;
  pcePath = storagePath;
  pceDocName = docName || 'Imagen';
  pceCropping = false;
  pceEdited = false;
  pceEditedDataUrl = '';

  document.getElementById('pceTitle').textContent = pceDocName;
  document.getElementById('pceCrop').style.display = 'none';

  var img = document.getElementById('pceImg');
  img.crossOrigin = 'anonymous';
  img.src = url;

  // Show editor immediately (image already preloaded from lightbox)
  document.getElementById('pcEditor').classList.add('on');
  document.body.style.overflow = 'hidden';
}

function closePcEditor() {
  document.getElementById('pcEditor').classList.remove('on');
  document.body.style.overflow = '';
  pceCropping = false;
  document.getElementById('pceCrop').style.display = 'none';
}

function getImgBounds() {
  var img = document.getElementById('pceImg');
  var wrap = document.getElementById('pceWrap');
  var ir = img.getBoundingClientRect();
  var wr = wrap.getBoundingClientRect();
  return { l: ir.left - wr.left, t: ir.top - wr.top, w: ir.width, h: ir.height };
}

function togglePcCrop() {
  pceCropping = !pceCropping;
  var cropEl = document.getElementById('pceCrop');
  if (pceCropping) {
    var b = getImgBounds();
    var m = 30;
    cropEl.style.left = (b.l + m) + 'px';
    cropEl.style.top = (b.t + m) + 'px';
    cropEl.style.width = (b.w - m * 2) + 'px';
    cropEl.style.height = (b.h - m * 2) + 'px';
    cropEl.style.display = 'block';
  } else {
    cropEl.style.display = 'none';
  }
}

function applyCropPc() {
  if (!pceCropping) { showToast('Activa el recorte primero', 'info'); return; }
  try {
    var img = document.getElementById('pceImg');
    var cropEl = document.getElementById('pceCrop');
    var ir = img.getBoundingClientRect();
    var cr = cropEl.getBoundingClientRect();

    // Offset by border width (3px) so crop matches what's inside the border lines
    var bw = 3;
    var scaleX = img.naturalWidth / ir.width;
    var scaleY = img.naturalHeight / ir.height;
    var sx = Math.max(0, (cr.left + bw) - ir.left) * scaleX;
    var sy = Math.max(0, (cr.top + bw) - ir.top) * scaleY;
    var sw = (cr.width - bw * 2) * scaleX;
    var sh = (cr.height - bw * 2) * scaleY;

    sw = Math.min(sw, img.naturalWidth - sx);
    sh = Math.min(sh, img.naturalHeight - sy);

    var c = document.createElement('canvas');
    c.width = Math.round(sw); c.height = Math.round(sh);
    c.getContext('2d').drawImage(img, Math.round(sx), Math.round(sy), Math.round(sw), Math.round(sh), 0, 0, c.width, c.height);

    pceEditedDataUrl = c.toDataURL('image/jpeg', 0.92);
    pceEdited = true;
    img.src = pceEditedDataUrl;
    pceCropping = false;
    cropEl.style.display = 'none';
    showToast('Recorte listo. Pulsa Guardar.', 'success');
  } catch (e) {
    showToast('Error al recortar: ' + e.message, 'error');
  }
}

function savePcEdit() {
  if (!pceEdited || !pceEditedDataUrl) { showToast('No hay cambios', 'info'); return; }

  var bin = atob(pceEditedDataUrl.split(',')[1]);
  var arr = new Uint8Array(bin.length);
  for (var i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  var blob = new Blob([arr], { type: 'image/jpeg' });

  var saveBtn = document.querySelector('#pcEditor .pce-btn.save');
  if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = 'Guardando...'; }

  // Clean path: remove any query params that might have leaked in
  var cleanPath = pcePath.split('?')[0];
  console.log('Saving to:', cleanPath, 'blob size:', blob.size, 'bytes');

  fetch(SB_URL + '/storage/v1/object/' + BUCKET + '/' + cleanPath, {
    method: 'POST',
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'image/jpeg', 'x-upsert': 'true' },
    body: blob
  }).then(function(res) {
    if (!res.ok) return res.text().then(function(t) { throw new Error(res.status + ': ' + t); });
    return res.text().then(function(body) { console.log('Upload OK:', cleanPath, body); });
  }).then(function() {
    showToast('Imagen guardada correctamente', 'success');
    // Store edited image in memory so downloads use it directly
    editedImages[cleanPath] = pceEditedDataUrl;
    pceEdited = false;
    closePcEditor();
    imgCacheBuster = Date.now();
    softReloadDate(cleanPath);
  }).catch(function(e) {
    showToast('Error al guardar: ' + e.message, 'error');
    console.error('Save error:', e);
  }).finally(function() {
    if (saveBtn) { saveBtn.disabled = false; saveBtn.innerHTML = '&#10003; Guardar'; }
  });
}

function deletePcImage() {
  if (!confirm('¿Eliminar esta imagen?\n\nNo se puede deshacer.')) return;
  closePcEditor();
  doDeletePcFile(pcePath);
}

function doDeletePcFile(storagePath) {
  showToast('Eliminando...', 'info');
  sbDelete([storagePath]).then(function(res) {
    if (!res.ok) throw new Error('Error ' + res.status);
    showToast('Archivo eliminado', 'success');
    softReloadDate(storagePath);
  }).catch(function(e) {
    showToast('Error al eliminar: ' + e.message, 'error');
  });
}

function softReloadDate(path) {
  var parts = path.split('?')[0].split('/');
  var wId, date;
  // Handle both 'workers/id/date/...' and 'servicio/workers/id/date/...'
  var wIdx = parts.indexOf('workers');
  if (wIdx >= 0 && parts.length > wIdx + 2) {
    wId = parts[wIdx + 1];
    date = parts[wIdx + 2];
  }
  if (wId && date) {
    var fi = allWorkerFiles[wId];
    if (fi && fi.loaded[date]) {
      delete fi.loaded[date];
      loadDateFiles(wId, date);
    }
  }
}

/* PC Editor crop drag */
(function() {
  var dragType = '', handle = '', sx, sy, sl, st, sw, sh;

  document.addEventListener('mousedown', function(e) {
    var crop = document.getElementById('pceCrop');
    if (!crop || crop.style.display === 'none') return;
    if (!crop.contains(e.target)) return;

    if (e.target.classList.contains('ch')) {
      dragType = 'resize';
      handle = e.target.getAttribute('data-h');
    } else {
      dragType = 'move';
    }
    sx = e.clientX; sy = e.clientY;
    sl = crop.offsetLeft; st = crop.offsetTop;
    sw = crop.offsetWidth; sh = crop.offsetHeight;
    e.preventDefault();
  });

  document.addEventListener('mousemove', function(e) {
    if (!dragType) return;
    var crop = document.getElementById('pceCrop');
    var b = getImgBounds();
    var dx = e.clientX - sx, dy = e.clientY - sy;

    if (dragType === 'move') {
      crop.style.left = Math.max(b.l, Math.min(sl + dx, b.l + b.w - crop.offsetWidth)) + 'px';
      crop.style.top = Math.max(b.t, Math.min(st + dy, b.t + b.h - crop.offsetHeight)) + 'px';
    } else {
      var nl, nt, nw, nh;
      if (handle === 'br') {
        nw = Math.max(30, Math.min(sw + dx, b.l + b.w - sl));
        nh = Math.max(30, Math.min(sh + dy, b.t + b.h - st));
        crop.style.width = nw + 'px'; crop.style.height = nh + 'px';
      } else if (handle === 'tl') {
        nw = Math.max(30, sw - dx); nh = Math.max(30, sh - dy);
        nl = sl + sw - nw; nt = st + sh - nh;
        if (nl >= b.l) { crop.style.left = nl + 'px'; crop.style.width = nw + 'px'; }
        if (nt >= b.t) { crop.style.top = nt + 'px'; crop.style.height = nh + 'px'; }
      } else if (handle === 'tr') {
        nw = Math.max(30, Math.min(sw + dx, b.l + b.w - sl));
        nh = Math.max(30, sh - dy); nt = st + sh - nh;
        crop.style.width = nw + 'px';
        if (nt >= b.t) { crop.style.top = nt + 'px'; crop.style.height = nh + 'px'; }
      } else if (handle === 'bl') {
        nw = Math.max(30, sw - dx); nl = sl + sw - nw;
        nh = Math.max(30, Math.min(sh + dy, b.t + b.h - st));
        if (nl >= b.l) { crop.style.left = nl + 'px'; crop.style.width = nw + 'px'; }
        crop.style.height = nh + 'px';
      }
    }
  });

  document.addEventListener('mouseup', function() { dragType = ''; });
})();

/* =========================================================
   FORCE REFRESH: clear SW cache + reload data
   ========================================================= */
function forceRefresh() {
  // Silently clear old SW caches and force update
  if ('caches' in window) {
    caches.keys().then(function(names) {
      return Promise.all(names.map(function(n) { return caches.delete(n); }));
    }).then(function() {
      console.log('All caches cleared');
    });
  }
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(function(regs) {
      regs.forEach(function(r) { r.update(); });
    });
  }
  // Reload all data fresh
  loadAllData();
}

/* Register Service Worker — auto-update on every page load */
if ('serviceWorker' in navigator) {
  var pcReloading = false;
  // updateViaCache:'none' = ALWAYS fetch sw.js from network, never HTTP cache
  navigator.serviceWorker.register('./sw.js', { updateViaCache: 'none' }).then(function(reg) {
    // Force update check on EVERY page load
    reg.update();
    // Also check every 60 seconds
    setInterval(function() { reg.update(); }, 60000);
    reg.addEventListener('updatefound', function() {
      var nw = reg.installing;
      if (nw) nw.addEventListener('statechange', function() {
        if (nw.state === 'activated' && !pcReloading) {
          pcReloading = true;
          window.location.reload();
        }
      });
    });
  }).catch(function(e) { console.log('SW error:', e); });
  // Also listen for controllerchange (covers skipWaiting scenario)
  navigator.serviceWorker.addEventListener('controllerchange', function() {
    if (!pcReloading) {
      pcReloading = true;
      window.location.reload();
    }
  });
}
