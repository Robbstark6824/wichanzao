<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0C1F3D"/>
      <stop offset="100%" style="stop-color:#1B3A6B"/>
    </linearGradient>
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ECDC4"/>
      <stop offset="100%" style="stop-color:#3BB8B0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="102" fill="url(#bg)"/>
  <!-- Document shape -->
  <rect x="126" y="80" width="260" height="320" rx="24" fill="rgba(255,255,255,0.08)"/>
  <rect x="136" y="90" width="240" height="300" rx="18" fill="rgba(255,255,255,0.05)"/>
  <!-- Scan line -->
  <rect x="106" y="235" width="300" height="4" rx="2" fill="url(#teal)" opacity="0.9"/>
  <rect x="106" y="235" width="300" height="20" rx="2" fill="url(#teal)" opacity="0.12"/>
  <!-- CSW Text -->
  <text x="256" y="210" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="900" font-size="120" fill="#FFFFFF" letter-spacing="4">CSW</text>
  <!-- "scan" subtitle -->
  <text x="256" y="290" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="600" font-size="48" fill="#4ECDC4" letter-spacing="12">SCAN</text>
  <!-- Corner brackets (scanner feel) -->
  <path d="M146 110 L146 140" stroke="#4ECDC4" stroke-width="5" stroke-linecap="round" fill="none"/>
  <path d="M146 110 L176 110" stroke="#4ECDC4" stroke-width="5" stroke-linecap="round" fill="none"/>
  <path d="M366 110 L366 140" stroke="#4ECDC4" stroke-width="5" stroke-linecap="round" fill="none"/>
  <path d="M366 110 L336 110" stroke="#4ECDC4" stroke-width="5" stroke-linecap="round" fill="none"/>
  <path d="M146 370 L146 340" stroke="#4ECDC4" stroke-width="5" stroke-linecap="round" fill="none"/>
  <path d="M146 370 L176 370" stroke="#4ECDC4" stroke-width="5" stroke-linecap="round" fill="none"/>
  <path d="M366 370 L366 340" stroke="#4ECDC4" stroke-width="5" stroke-linecap="round" fill="none"/>
  <path d="M366 370 L336 370" stroke="#4ECDC4" stroke-width="5" stroke-linecap="round" fill="none"/>
  <!-- Bottom tagline -->
  <text x="256" y="440" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="700" font-size="28" fill="rgba(255,255,255,0.35)" letter-spacing="2">WICHANZAO</text>
</svg>
