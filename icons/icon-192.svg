<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0C1F3D"/>
      <stop offset="100%" style="stop-color:#1B3A6B"/>
    </linearGradient>
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ECDC4"/>
      <stop offset="100%" style="stop-color:#3BB8B0"/>
    </linearGradient>
  </defs>
  <rect width="192" height="192" rx="38" fill="url(#bg)"/>
  <!-- Document bg -->
  <rect x="46" y="28" width="100" height="124" rx="10" fill="rgba(255,255,255,0.08)"/>
  <!-- Scan line -->
  <rect x="38" y="88" width="116" height="2" rx="1" fill="url(#teal)" opacity="0.9"/>
  <rect x="38" y="88" width="116" height="8" rx="1" fill="url(#teal)" opacity="0.12"/>
  <!-- CSW -->
  <text x="96" y="80" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="900" font-size="44" fill="#FFFFFF" letter-spacing="2">CSW</text>
  <!-- scan -->
  <text x="96" y="112" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="600" font-size="18" fill="#4ECDC4" letter-spacing="5">SCAN</text>
  <!-- Corner brackets -->
  <path d="M54 40 L54 52" stroke="#4ECDC4" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M54 40 L66 40" stroke="#4ECDC4" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M138 40 L138 52" stroke="#4ECDC4" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M138 40 L126 40" stroke="#4ECDC4" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M54 140 L54 128" stroke="#4ECDC4" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M54 140 L66 140" stroke="#4ECDC4" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M138 140 L138 128" stroke="#4ECDC4" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M138 140 L126 140" stroke="#4ECDC4" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- Bottom -->
  <text x="96" y="168" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="700" font-size="11" fill="rgba(255,255,255,0.35)" letter-spacing="1">WICHANZAO</text>
